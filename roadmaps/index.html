<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Role Prep Roadmaps</title>
<style>
:root {
  --bg: #eef1f6; --panel: #ffffff; --text: #1e2733; --muted: #5d6b7c;
  --accent: #2563eb; --accent-strong: #1d4ed8; --accent-soft: #e9f0fe;
  --border: #e2e8f0; --done: #15803d; --done-soft: #ecf9f1;
  --code-bg: #f5f7fa; --row: #f8fafc;
  --shadow: 0 1px 2px rgba(15,23,42,.05), 0 10px 30px rgba(15,23,42,.06);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0b0f15; --panel: #131922; --text: #e9eef5; --muted: #9aa8ba;
    --accent: #6ea3ff; --accent-strong: #8ab4ff; --accent-soft: #1a2436;
    --border: #283242; --done: #4ade80; --done-soft: #13291d;
    --code-bg: #1a2230; --row: #171f2b; --shadow: none;
  }
}
:root[data-theme="dark"] {
  --bg: #0b0f15; --panel: #131922; --text: #e9eef5; --muted: #9aa8ba;
  --accent: #6ea3ff; --accent-strong: #8ab4ff; --accent-soft: #1a2436;
  --border: #283242; --done: #4ade80; --done-soft: #13291d;
  --code-bg: #1a2230; --row: #171f2b; --shadow: none;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font-family: "Segoe UI Variable Text", "Segoe UI", -apple-system, BlinkMacSystemFont,
    Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
header { position: sticky; top: 0; z-index: 10; background: var(--panel);
  border-bottom: 1px solid var(--border); padding: 0 24px; box-shadow: var(--shadow); }
.header-row { display: flex; align-items: center; gap: 14px; max-width: 1280px;
  margin: 0 auto; flex-wrap: wrap; padding: 10px 0; }
h1.site { font-size: 16px; margin: 0; white-space: nowrap; letter-spacing: .2px; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab { border: 1px solid var(--border); background: transparent; color: var(--muted);
  padding: 8px 16px; border-radius: 999px; cursor: pointer; font-size: 13.5px;
  font-weight: 600; transition: color .15s, border-color .15s, background .15s; }
.tab:hover { color: var(--accent); border-color: var(--accent); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.font-controls { display: flex; gap: 5px; }
.font-controls button { border: 1px solid var(--border); background: transparent;
  color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 700; line-height: 1; }
.font-controls button:hover { color: var(--accent); border-color: var(--accent); }
.progress-wrap { margin-left: auto; min-width: 190px; }
.progress-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--done); width: 0; transition: width .3s; }
.layout { display: flex; max-width: 1280px; margin: 0 auto; gap: 28px; padding: 28px 24px 64px; }
nav.side { width: 242px; flex-shrink: 0; position: sticky; top: 74px;
  align-self: flex-start; max-height: calc(100vh - 96px); overflow-y: auto; }
.doc-btn { display: block; width: 100%; text-align: left; margin: 3px 0; padding: 9px 14px;
  border: none; background: transparent; color: var(--muted); border-radius: 10px;
  cursor: pointer; font-size: 14px; font-weight: 500; }
.doc-btn:hover { background: var(--accent-soft); color: var(--accent-strong); }
.doc-btn.active { background: var(--accent-soft); color: var(--accent-strong); font-weight: 700; }
.toc { margin: 14px 0 0 6px; padding-left: 12px; border-left: 2px solid var(--border); }
.toc a { display: block; font-size: 12.5px; color: var(--muted); text-decoration: none;
  padding: 4px 8px; border-radius: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toc a:hover { color: var(--accent); background: var(--accent-soft); }
main { flex: 1; min-width: 0; background: var(--panel); border: 1px solid var(--border);
  border-radius: 16px; padding: 44px 56px 60px; box-shadow: var(--shadow);
  font-size: var(--content-size, 17px); line-height: 1.8; }
main > * { max-width: 76ch; }
main h1 { font-size: 1.75em; line-height: 1.3; margin: 0 0 .7em; padding-bottom: .45em;
  border-bottom: 2px solid var(--border); letter-spacing: -.015em; }
main h2 { font-size: 1.35em; line-height: 1.4; margin: 2.1em 0 .8em; padding-left: .55em;
  border-left: 4px solid var(--accent); letter-spacing: -.01em; }
main h3 { font-size: 1.13em; line-height: 1.45; margin: 1.7em 0 .55em; }
main p { margin: .9em 0; }
main ul, main ol { padding-left: 1.4em; margin: .8em 0; }
main li { margin: .45em 0; }
main li > ul, main li > ol { margin: .3em 0; }
main a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent;
  transition: border-color .15s; }
main a:hover { border-bottom-color: var(--accent); }
main strong { font-weight: 650; }
main hr { border: none; border-top: 1px solid var(--border); margin: 2.4em 0; }
main code { background: var(--code-bg); border: 1px solid var(--border);
  padding: .12em .38em; border-radius: 6px; font-size: .85em;
  font-family: "Cascadia Code", Consolas, "JetBrains Mono", Menlo, monospace; }
main pre { background: var(--code-bg); border: 1px solid var(--border);
  padding: 1.1em 1.3em; border-radius: 12px; overflow-x: auto; line-height: 1.6; }
main pre code { border: none; padding: 0; background: none; font-size: .86em; }
main table { border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: .9em;
  line-height: 1.6; display: block; overflow-x: auto; }
main th, main td { border: 1px solid var(--border); padding: .65em .95em;
  text-align: left; vertical-align: top; }
main th { background: var(--code-bg); }
main tbody tr:nth-child(even) { background: var(--row); }
main blockquote { border-left: 4px solid var(--accent); margin: 1.1em 0;
  padding: .55em 1.15em; color: var(--muted); background: var(--accent-soft);
  border-radius: 0 10px 10px 0; }
main input[type=checkbox] { width: 1.05em; height: 1.05em; margin: .32em .6em 0 0;
  accent-color: var(--done); cursor: pointer; flex-shrink: 0; }
li.task { list-style: none; margin-left: -1.4em; padding: .5em .75em; border-radius: 10px;
  display: flex; align-items: flex-start; transition: background .15s; }
li.task:hover { background: var(--code-bg); }
li.task.done { background: var(--done-soft); }
li.task.done > .task-text { color: var(--muted); text-decoration: line-through; }
li.task .task-text { flex: 1; min-width: 0; }
details.qa { border: 1px solid var(--border); border-radius: 14px; margin: .9em 0;
  padding: 0 1.25em; transition: border-color .15s; }
details.qa > summary { cursor: pointer; font-weight: 650; padding: 1em 0;
  font-size: 1em; line-height: 1.5; list-style: none; display: flex; gap: .6em; }
details.qa > summary::before { content: "▸"; color: var(--accent); flex-shrink: 0;
  transition: transform .15s; }
details.qa[open] > summary::before { transform: rotate(90deg); }
details.qa > summary::-webkit-details-marker { display: none; }
details.qa > summary:hover { color: var(--accent); }
details.qa[open] { background: var(--code-bg); padding-bottom: 1.1em;
  border-color: var(--accent); }
.hint { font-size: .78em; color: var(--muted); margin-bottom: 1.1em; }
.controls { display: flex; gap: 10px; margin-bottom: .6em; }
.controls button { font-size: 12.5px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 8px; padding: 5px 12px; cursor: pointer; }
.controls button:hover { color: var(--accent); border-color: var(--accent); }
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  nav.side { position: static; width: 100%; max-height: none; }
  main { padding: 24px 20px; }
  .progress-wrap { min-width: 140px; }
}
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1 class="site">🎯 Role Prep Roadmaps</h1>
    <div class="tabs" id="roleTabs"></div>
    <div class="font-controls">
      <button id="fsMinus" title="Smaller text">A−</button>
      <button id="fsPlus" title="Larger text">A+</button>
      <button id="themeToggle" title="Switch light/dark theme">◐</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
</header>
<div class="layout">
  <nav class="side">
    <div id="docNav"></div>
    <div class="toc" id="toc"></div>
  </nav>
  <main id="content"></main>
</div>

const DATA = {"roles": [{"slug": "ai-ml-engineer", "name": "AI/ML Engineer", "docs": [{"id": "README", "file": "README.md", "title": "Overview", "md": "# AI/ML Engineer\n\n## What the role is\n\nAn AI/ML Engineer builds, ships, and maintains machine learning systems in production. In 2026 the role has two overlapping flavors:\n\n- **Classic MLE**: trains and deploys models — feature pipelines, training, serving, monitoring (recommendation, ranking, forecasting, vision).\n- **AI Engineer (GenAI)**: builds on top of foundation models — RAG pipelines, agents, fine-tuning, eval harnesses, LLM serving. This is where most entry-level hiring happens now.\n\nEntry-level interviews test both: you need classic ML fundamentals *and* the modern LLM stack. Companies stopped asking candidates to recite gradient descent; they now test whether you can design a system, measure whether it works, and debug it when it breaks in production.\n\n## Who hires\n\n| Segment | Notes |\n|---|---|\n| Big tech (Google, Meta, Amazon, Microsoft) | Formal MLE ladders; heaviest on fundamentals + ML system design; some DSA rounds. |\n| AI-native companies (OpenAI, Anthropic, Mistral, Cohere) | Rarely entry-level; strong engineering bar; get there via 1–2 years elsewhere. |\n| Startups & scale-ups | Most realistic entry point; GenAI-heavy (RAG, agents, evals); portfolio matters more than pedigree. |\n| Non-tech enterprises (banks, retail, health) | Underrated: less competition, classic ML + increasingly GenAI. |\n\n## The skills profile\n\n- **Fundamentals**: linear algebra & stats intuition, classic ML (regression, trees, clustering, bias/variance, cross-validation), deep learning basics.\n- **Engineering**: solid Python, pandas/NumPy, PyTorch, SQL, Git, Docker basics, one cloud.\n- **Modern stack (2026 must-have)**: transformers/LLMs, RAG, fine-tuning vs prompting judgment, eval frameworks, agents.\n- **Production sense**: serving, monitoring, drift, cost/latency trade-offs, debugging models that were fine yesterday.\n\n## What's in this package\n\n| File | What it's for |\n|---|---|\n| [roadmap.md](roadmap.md) | 6-week intensive study plan (~3–4 hrs/day) with checkboxes |\n| [interview-prep.md](interview-prep.md) | Round types, question bank, ML system design framework, final-week drills |\n| [qa-bank.md](qa-bank.md) | Detailed questions **with answers**: ML fundamentals, deep learning, LLMs, from-scratch code, worked system design |\n| [resources.md](resources.md) | Every free resource + free certifications, with why-this-one notes |\n\n## How to use it\n\n1. Follow `roadmap.md` in order — it builds classic ML → deep learning → LLMs → production, each on top of the last.\n2. The milestone projects become your portfolio; entry-level MLE hiring is portfolio-driven.\n3. Read `interview-prep.md` up front, drill from it in week 6.\n4. Links break; run `python tools/check_links.py roadmaps/ai-ml-engineer/` and swap in alternatives from `resources.md`.\n\n**Overlap note:** weeks 1 and 4 share material with the [FDE package](../fde/) (Python/SQL, RAG/evals). If you prepare both roles, do this roadmap first — AI/ML prep is a superset of the FDE technical bar; FDE adds the customer/decomposition layer on top.\n", "tasks": 0}, {"id": "roadmap", "file": "roadmap.md", "title": "Roadmap", "md": "# AI/ML Engineer Roadmap — 6 Weeks Intensive (~3–4 hrs/day)\n\nEvery task links to a free resource (details and alternatives in [resources.md](resources.md)).\nSequence: Python/math → classic ML → deep learning → LLMs → production/MLOps → interview drills.\nMilestones become your portfolio — do not skip them.\n\n---\n\n## Week 1 — Python for data, math intuition\n\n**Goal:** fluent NumPy/pandas and enough linear algebra/stats intuition to explain any model you use.\n\n- [ ] Day 1–2: Python check — if you're shaky, do [CS50P](https://cs50.harvard.edu/python/) lectures 0–5 fast; if solid, go straight on.\n- [ ] Day 2–4: [Kaggle Learn](https://www.kaggle.com/learn) — Pandas + Data Visualization micro-courses (hands-on, in-browser, free certificates).\n- [ ] Day 3–5: [3Blue1Brown — Essence of Linear Algebra](https://www.3blue1brown.com/topics/linear-algebra) — chapters 1–10. Watch actively: pause and predict. *(~4 hrs)*\n- [ ] Day 5–7: [StatQuest — Statistics Fundamentals](https://www.youtube.com/@statquest) — distributions, p-values, likelihood; then his ML playlist basics (bias/variance is interview gold). *(~4 hrs)*\n- [ ] Daily: 30 min SQL on [SQLBolt](https://sqlbolt.com/) → [SQL Practice](https://www.sql-practice.com/) (MLE interviews include SQL more often than you'd think).\n\n**Milestone project:** pick a [Kaggle dataset](https://www.kaggle.com/datasets) and publish an exploratory-data-analysis notebook: cleaning, 5 meaningful visualizations, 5 written insights. This is portfolio piece #1. *(~4 hrs)*\n\n---\n\n## Week 2 — Classic ML\n\n**Goal:** the supervised-learning core that every ML breadth round tests.\n\n- [ ] Day 1–5: [Andrew Ng — Machine Learning Specialization](https://www.coursera.org/specializations/machine-learning-introduction) (audit each course free) — Course 1 fully + Course 2 through decision trees. Do the labs. *(~3 hrs/day)*\n- [ ] Day 1–5 (parallel, 30 min/day): [StatQuest ML playlist](https://www.youtube.com/@statquest) — watch the video for each concept the same day Ng covers it (two angles beat one).\n- [ ] Day 5–6: [Kaggle Learn — Intro to Machine Learning + Intermediate ML](https://www.kaggle.com/learn) — scikit-learn workflow: pipelines, cross-validation, handling missing data/leakage.\n- [ ] Day 7: Implement **from scratch in NumPy**: linear regression (gradient descent) and k-means. Then start the habit — 1 problem/day on [Deep-ML](https://www.deep-ml.com/) (LeetCode-style ML-from-scratch problems, free).\n\n**Milestone project:** enter a Kaggle Getting Started competition (e.g., [Spaceship Titanic](https://www.kaggle.com/competitions/spaceship-titanic)) — proper train/validation split, feature engineering, 3 model comparison, submission. Write up what moved the score. Portfolio piece #2. *(~5 hrs)*\n\n---\n\n## Week 3 — Deep learning\n\n**Goal:** understand neural nets from scratch, be productive in PyTorch.\n\n- [ ] Day 1–3: [Karpathy — Neural Networks: Zero to Hero](https://karpathy.ai/zero-to-hero.html) — lectures 1–2 (micrograd: backprop from scratch; makemore part 1). **Type every line yourself.** This is the single best interview prep for \"explain backpropagation.\" *(~4 hrs/day, dense)*\n- [ ] Day 4–5: [PyTorch — Learn the Basics](https://pytorch.org/tutorials/beginner/basics/intro.html) — tensors → datasets → build/train/save models.\n- [ ] Day 5–6: Karpathy lecture 3–4 (MLPs, BatchNorm internals — where deep-dive interview questions come from).\n- [ ] Day 7: [fast.ai — Practical Deep Learning](https://course.fast.ai/) lesson 1 for the top-down view, and train your first real model with it.\n\n**Milestone project:** train a text or image classifier in PyTorch on a real dataset (e.g., sentiment on IMDB, or a fast.ai vision task) — training curves, a confusion matrix, and a 200-word error analysis (which examples fail and why). Portfolio piece #3. *(~5 hrs)*\n\n---\n\n## Week 4 — Transformers, LLMs, RAG, evals\n\n**Goal:** the GenAI stack that dominates 2026 entry-level hiring.\n\n- [ ] Day 1–2: Karpathy — [\"Let's build GPT\"](https://karpathy.ai/zero-to-hero.html) (build a transformer from scratch; after this, attention questions are easy).\n- [ ] Day 3: [Hugging Face LLM Course](https://huggingface.co/learn/llm-course) — chapters 1–3 (tokenizers, using pretrained models, fine-tuning basics with the Trainer API).\n- [ ] Day 4: LLM APIs + prompting: [Anthropic courses repo](https://github.com/anthropics/courses) API + prompt-engineering notebooks (free tier key suffices).\n- [ ] Day 5: Build a minimal **RAG pipeline from scratch** (no framework): chunk → embed → store → retrieve top-k → answer with citations.\n- [ ] Day 6: **Evals** — read [Hamel Husain — Your AI Product Needs Evals](https://hamel.dev/blog/posts/evals/) and build an eval harness for your RAG app (15 Q/A pairs, exact-match + LLM-as-judge scoring, results table). Interviewers at every level now ask \"how do you know it works?\"\n- [ ] Day 7: One [DeepLearning.AI short course](https://www.deeplearning.ai/short-courses/) on fine-tuning **or** agents — pick your bigger gap.\n\n**Milestone project:** \"docs Q&A with proof it works\" — RAG over a public doc set + the eval harness + a README table of eval results before/after one improvement (better chunking, reranking, or prompt change). Portfolio piece #4 — this one gets discussed in interviews. *(~5 hrs)*\n\n---\n\n## Week 5 — Production ML: serving, MLOps, ML system design\n\n**Goal:** the production sense that separates hired from rejected in 2026.\n\n- [ ] Day 1–2: [Made With ML](https://madewithml.com/) — design, data, modeling, and deployment lessons (skim what you know; the testing/monitoring lessons are the differentiator).\n- [ ] Day 2–3: Serve your Week 3 or 4 model as a [FastAPI](https://fastapi.tiangolo.com/tutorial/) endpoint; containerize it with [Docker — Get Started](https://docs.docker.com/get-started/).\n- [ ] Day 4–5: [Chip Huyen — Machine Learning Systems Design](https://huyenchip.com/machine-learning-systems-design/toc.html) (free booklet) — read fully; learn the framework in [interview-prep.md](interview-prep.md).\n- [ ] Day 5–6: Study 5 real case studies from the [Evidently AI ML system design database](https://www.evidentlyai.com/ml-system-design) — pick ones near your interests (recsys, fraud, LLM apps).\n- [ ] Day 7: Timed practice — write full ML system designs (45 min each, on [Excalidraw](https://excalidraw.com/)) for two prompts: \"design a spam detector for a mail product\" and \"design a support-ticket answering system with an LLM.\"\n\n**Milestone:** your served model (Docker + FastAPI, README with `docker run` instructions) + one polished system-design doc. Portfolio piece #5.\n\n---\n\n## Week 6 — Interview drills\n\n**Goal:** performance. The day-by-day schedule and question bank live in [interview-prep.md](interview-prep.md).\n\n- [ ] Daily: 1 [Deep-ML](https://www.deep-ml.com/) from-scratch problem + 1–2 [NeetCode](https://neetcode.io/roadmap) problems (arrays/hashing, two pointers — enough for most MLE coding screens).\n- [ ] 3× ML breadth self-quizzes out loud (question bank in interview-prep.md — answer as if teaching).\n- [ ] 2× timed ML system design cases (45 min, new prompts).\n- [ ] 2× mock interviews on [Pramp](https://www.pramp.com/) (one coding, one you convert to ML discussion with your peer).\n- [ ] 1× project deep-dive rehearsal: 10-minute walkthrough of portfolio piece #4, then have a friend grill you (\"why this chunk size?\", \"what if latency doubles?\").\n- [ ] Prepare 6 STAR behavioral stories (template in interview-prep.md).\n- [ ] Polish GitHub + a one-page portfolio README linking all 5 pieces; apply broadly (startups, enterprises, big-tech new-grad MLE).\n\n**Final milestone:** full self-run loop in one day — ML coding (60') → ML breadth (45') → ML system design (60') → project deep-dive (30') → behavioral (30'). Score with the rubric in interview-prep.md.\n", "tasks": 31}, {"id": "interview-prep", "file": "interview-prep.md", "title": "Interview Prep", "md": "# AI/ML Engineer Interview Prep\n\nRound types, question banks, the ML system design framework, and the week-6 drill schedule.\n\n---\n\n## The typical entry-level loop\n\n1. **Recruiter screen** (30 min)\n2. **Technical phone screen** (60 min) — ML concepts + light coding\n3. **Onsite loop** (3–4 rounds over 1–3 days):\n   - ML coding (implement from scratch / data manipulation)\n   - ML breadth & depth (fundamentals Q&A + follow-the-thread deep dives)\n   - ML system design (45–60 min — the highest-weight round in 2026)\n   - Project deep-dive (your portfolio, grilled)\n4. **Behavioral** (30–45 min)\n\nSome big-tech loops add a general DSA round (LeetCode medium level). Startups often replace it with a practical take-home (frequently RAG/eval flavored — your week 4 milestone is direct practice).\n\n**The 2026 shift:** interviewers care less about definitions, more about system design over models you don't control, retrieval and evaluation judgment, production debugging, and cost/latency trade-offs. Responsible-AI questions (bias audits, SHAP/LIME explainability) now appear as technical questions, not values chat.\n\n---\n\n## Question bank by round\n\n### ML coding\n- Implement linear regression with gradient descent (NumPy only). Follow-up: add L2 regularization.\n- Implement k-means / k-NN / logistic regression from scratch.\n- Given a messy DataFrame: clean it, engineer features, avoid leakage — narrate your choices.\n- Implement train/validation split with stratification; explain why stratify.\n- Compute precision/recall/F1 from raw predictions without sklearn.\n- Practice source: [Deep-ML](https://www.deep-ml.com/) mirrors this round almost exactly.\n\n### ML breadth (know these cold — answer out loud as if teaching)\n- Bias vs variance; how you detect and fix each.\n- Overfitting: five ways to reduce it, and when each applies.\n- L1 vs L2 regularization; why L1 produces sparsity.\n- Logistic regression vs decision tree vs gradient boosting — when and why.\n- How does backpropagation work? (You built it in week 3 — say so.)\n- BatchNorm / dropout — what problem does each solve?\n- Precision vs recall: pick one to optimize for cancer screening vs spam. Why?\n- Class imbalance: what you actually do (and why accuracy is the wrong metric).\n- Cross-validation variants; when time-series CV is mandatory.\n- How do transformers work? Attention in one whiteboard drawing.\n- Fine-tuning vs RAG vs prompt engineering — cost/freshness/control trade-offs.\n- What are embeddings? How would you build semantic search?\n- How do you evaluate an LLM application when there's no single right answer?\n- What is drift? How do you detect a model quietly degrading in production?\n- Explain SHAP/LIME at a high level; when would a stakeholder demand them?\n\n### ML depth (they pull one thread from your resume/projects)\nWhatever you list, expect five \"why\"s deep: why this chunk size, why this metric, why not a simpler baseline, what failed first, what would you do with 10× data. Rehearse your portfolio pieces to that depth — especially the RAG + evals project.\n\n### ML system design (train hardest here)\nPrompts: *\"Design a spam filter\"*, *\"Design a feed-ranking system\"*, *\"Design fraud detection for payments\"*, *\"Design a support-bot over company docs\"*, *\"Design an eval pipeline for an LLM feature.\"*\n\n**Framework** (from [Chip Huyen's booklet](https://huyenchip.com/machine-learning-systems-design/toc.html)):\n1. **Clarify & frame** (5–10 min): users, scale, latency budget, cost constraints; is ML even needed? What's the *business* metric vs the *model* metric?\n2. **Data**: sources, labels (who labels? how much? how fresh?), feature pipeline, leakage risks.\n3. **Baseline first**: rules/heuristics or logistic regression before deep anything — say this explicitly, it's a hire signal.\n4. **Model & training**: candidate models with trade-offs; how you'd validate offline.\n5. **Serving**: batch vs online, latency/cost estimates, caching, fallbacks when the model or API fails.\n6. **Evaluation & monitoring**: offline metrics → online A/B → drift detection → feedback loops. For LLM systems: eval sets, LLM-as-judge, guardrails.\n7. **Iterate**: what you'd measure to decide the next improvement.\n\n**Instant-fail behaviors:** jumping to \"I'd fine-tune an LLM\" before framing; no baseline; no evaluation story; ignoring cost/latency.\n\n### Behavioral (6 STAR stories)\nThemes: a project you owned end-to-end · a technical decision you got wrong · handling ambiguous requirements · a deadline crunch · explaining ML to a non-technical person · a conflict or pushback you navigated. Format: Situation (2 sentences) → Task → Action (bulk, \"I\" not \"we\") → Result (numbers if possible).\n\n---\n\n## Week-6 drill schedule\n\n| Day | Drill (~3–4 hrs) |\n|---|---|\n| 1 | 2 Deep-ML problems + ML breadth self-quiz (first 8 questions, out loud) + 2 NeetCode |\n| 2 | Timed ML system design #1 (spam filter, 45') + rehearse 3 STAR stories |\n| 3 | [Pramp](https://www.pramp.com/) mock #1 + review; ML breadth quiz (last 7 questions) |\n| 4 | Project deep-dive rehearsal with a friend grilling you + 2 Deep-ML problems |\n| 5 | Timed ML system design #2 (LLM support bot, 45') + Pramp mock #2 |\n| 6 | **Full self-run loop:** ML coding 60' → breadth 45' → system design 60' → project 30' → behavioral 30' |\n| 7 | Patch the weakest round; polish portfolio README; send applications |\n\n## Self-scoring rubric (per round, 1–4)\n\n- **1** — Stalled without hints; answered definitions but couldn't apply them\n- **2** — Correct but shallow: no trade-offs, no baseline, no eval story\n- **3** — Structured, justified choices, connected model metrics to business outcomes\n- **4** — Hire signal: proactively raised failure modes, monitoring, cost — and adjusted when challenged\n\nAnything ≤2 gets a targeted retry the next day.\n\n---\n\n## Free deep-dive reading\n\n- [Chip Huyen — Introduction to ML Interviews Book](https://huyenchip.com/ml-interviews-book/) — free online; the interview-landscape chapters are excellent for calibration.\n- [Chip Huyen — ML Systems Design booklet](https://huyenchip.com/machine-learning-systems-design/toc.html) — free; read fully in week 5.\n- [Evidently AI — ML system design case database](https://www.evidentlyai.com/ml-system-design) — 300+ real company case studies.\n- [Google — Rules of ML](https://developers.google.com/machine-learning/guides/rules-of-ml) — production ML wisdom; quotable in design rounds.\n", "tasks": 0}, {"id": "qa-bank", "file": "qa-bank.md", "title": "Q&A Bank", "md": "# AI/ML Engineer Question & Answer Bank\n\nDetailed questions **with answers** for every round. Rehearse out loud until you can explain each without reading. ⭐ = appears in almost every loop.\n\n---\n\n## Part 1 — Classic ML fundamentals (breadth round)\n\n### ⭐ Q1. Explain the bias–variance tradeoff.\n**Answer:** Bias is error from a model too simple to capture the real pattern (underfitting — bad on train *and* test). Variance is error from a model so flexible it fits noise (overfitting — great on train, bad on test). Total error ≈ bias² + variance + irreducible noise; making a model more expressive trades bias for variance. **Diagnose with learning curves:** high train error → high bias (add features, bigger model); large train/validation gap → high variance (more data, regularization, simpler model). Modern nuance worth adding: very large neural nets can defy the classic U-curve (double descent), but the diagnostic workflow is still how you debug in practice.\n\n### ⭐ Q2. How do you detect and prevent overfitting?\n**Answer:** Detect: validation performance much worse than training, or metrics that degrade on truly held-out data. Prevent — in rough order of preference: (1) more/better data (including augmentation); (2) regularization (L1/L2, dropout for nets); (3) early stopping on validation loss; (4) reduce model capacity; (5) cross-validation to make sure you're measuring honestly; (6) for trees/ensembles: limit depth, min samples per leaf. Key interview add: make sure it's actually overfitting and not **leakage** — a feature that encodes the label will show the same symptom on deployment.\n\n### ⭐ Q3. L1 vs L2 regularization — difference, and why does L1 produce sparsity?\n**Answer:** Both penalize large weights: L1 adds λ·Σ|w|, L2 adds λ·Σw². L2 shrinks all weights smoothly toward zero but rarely *to* zero; L1 drives some weights exactly to zero, doing built-in feature selection. Why: L1's penalty has a constant gradient (±λ) regardless of weight size, so it keeps pushing small weights all the way to zero — geometrically, the diamond-shaped L1 constraint has corners on the axes where solutions land. Use L1 when you suspect many irrelevant features or need interpretability; L2 as the default; elastic net for both.\n\n### ⭐ Q4. Logistic regression vs decision trees vs gradient boosting — when and why?\n**Answer:** - **Logistic regression**: the baseline. Fast, interpretable coefficients, well-calibrated probabilities, works with limited data. Linear boundary only — needs manual feature interactions. Regulated industries love it.\n- **Decision tree** (single): captures nonlinearity and interactions automatically, handles mixed types, no scaling needed — but high variance; rarely deployed alone.\n- **Gradient boosting** (XGBoost/LightGBM): the tabular-data workhorse — usually the accuracy winner on structured data, robust to feature scale and moderate messiness. Costs: more tuning, less interpretable (use SHAP), can overfit small noisy data.\n**Interview-winning framing:** \"I'd start with logistic regression as the baseline; if nonlinear patterns show in errors, move to gradient boosting; deep learning for tabular usually isn't worth it.\"\n\n### ⭐ Q5. Precision vs recall — and pick one to optimize for cancer screening vs spam filtering.\n**Answer:** Precision = of predicted positives, how many are truly positive (TP/(TP+FP)) — cost of false alarms. Recall = of actual positives, how many we caught (TP/(TP+FN)) — cost of misses. **Cancer screening: recall** — a missed cancer can be fatal, a false positive costs a follow-up test; but state the trade-off: too many false positives cause harm too (anxiety, unnecessary procedures), so you tune a threshold, not just max recall. **Spam: precision** — a real email in the spam folder (false positive) is worse than one spam getting through. F1 combines both; use it when costs are balanced. The general answer interviewers want: *the metric follows from the business cost of each error type* — always ask which error is more expensive.\n\n### Q6. What's the problem with accuracy on imbalanced data, and what do you do instead?\n**Answer:** With 1% fraud, \"predict never-fraud\" scores 99% accuracy while catching nothing. Use precision/recall, PR-AUC (better than ROC-AUC under heavy imbalance), and per-class metrics. Handling: (1) fix the metric first; (2) class weights / cost-sensitive loss (simplest and often enough); (3) resampling — oversample minority (SMOTE) or undersample majority — on the **training set only**, never validation/test; (4) threshold tuning on the PR curve to hit the business's operating point; (5) if positives are ultra-rare, consider anomaly-detection framing. Never evaluate on resampled data — report metrics on the true distribution.\n\n### ⭐ Q7. What is data leakage? Give examples and how to prevent it.\n**Answer:** Training-time access to information unavailable at prediction time — inflates offline metrics, collapses in production. Classic cases: (1) target leakage — a feature caused by the label (\"number of chemo sessions\" predicting cancer); (2) preprocessing leakage — fitting scalers/encoders/imputers on the full dataset before splitting (test-set statistics leak in); (3) temporal leakage — random splits on time-series so the model trains on the future; (4) group leakage — same patient/user in both train and test. Prevention: split **first**, fit transforms on train only (sklearn `Pipeline` inside CV does this right), time-based splits for temporal data, group-aware splits, and interrogate any feature that seems too good (\"would I know this at prediction time?\"). \"My model is at 99%\" usually means leakage, not genius.\n\n### Q8. Explain cross-validation and when plain k-fold is wrong.\n**Answer:** k-fold: split into k folds, train on k−1, validate on the held-out fold, rotate, average — a more reliable estimate than a single split, at k× cost. Wrong when data has structure a random split breaks: **time series** (use forward-chaining/rolling splits — train on past, validate on future only), **grouped data** (GroupKFold so the same user/patient never spans train and validation), **severe imbalance** (stratify folds). Also: do hyperparameter tuning inside the CV loop (nested CV) or your estimate is optimistically biased.\n\n### Q9. How do you handle missing data?\n**Answer:** First diagnose *why* it's missing — missing-at-random vs informative missingness (an empty \"salary\" field on a loan application is signal). Options: (1) drop rows/columns only if few and truly random; (2) simple imputation (median/mode) + a **\"was_missing\" indicator column** — the indicator often carries the signal; (3) model-based imputation (KNN/iterative) when relationships are strong; (4) tree libraries like XGBoost/LightGBM handle NaNs natively and learn the best direction for them. Fit imputers on train only (leakage). Never silently impute the target.\n\n### Q10. Explain gradient descent and the role of the learning rate.\n**Answer:** Iteratively update parameters opposite the loss gradient: w ← w − η·∇L. Variants: batch (all data per step — exact but slow), stochastic (one sample — noisy), mini-batch (the standard compromise). Learning rate η: too high diverges or bounces around the minimum; too low crawls and can stall. In practice: Adam optimizer as default, learning-rate schedules (warmup + decay), and \"if training loss explodes, first suspect the learning rate.\" Bonus point: loss surfaces of neural nets are non-convex — we settle for good local minima, which empirically generalize fine.\n\n### Q11. What is the curse of dimensionality?\n**Answer:** As dimensions grow, data becomes exponentially sparse: distances concentrate (nearest and farthest neighbors become nearly equidistant), so distance-based methods (k-NN, k-means) degrade, and the data needed to cover the space explodes. Remedies: feature selection, dimensionality reduction (PCA, or learned embeddings), regularization, and models less sensitive to it (trees split one dimension at a time). Also the reason \"just add more features\" can *hurt*.\n\n### Q12. Explain PCA in one minute.\n**Answer:** Find orthogonal directions of maximum variance (eigenvectors of the covariance matrix), project data onto the top k — compressing correlated features into fewer uncorrelated components while keeping most variance. Uses: visualization, denoising, speeding up downstream models, decorrelating features. Caveats: linear only, scale features first (variance is unit-dependent), components lose interpretability, and max-variance ≠ max-predictive — PCA ignores the label.\n\n---\n\n## Part 2 — Deep learning\n\n### ⭐ Q13. Explain backpropagation like you actually understand it.\n**Answer:** \"A neural net is a composition of differentiable functions. Forward pass computes the output and loss; backprop applies the chain rule *efficiently*: starting from the loss, walk the computation graph backwards, and each node multiplies the gradient flowing in by its local derivative to pass gradients to its inputs. One backward pass gets ∂loss/∂parameter for every parameter at roughly the cost of the forward pass — that efficiency is what makes training feasible at all. I've implemented it from scratch (micrograd-style): each operation stores its inputs and a `_backward` that routes gradients; you topologically sort the graph and run them in reverse.\" That last sentence — *and being able to back it up* — is why Karpathy lecture 1 is mandatory in the [roadmap](roadmap.md).\n\n### Q14. Vanishing/exploding gradients — cause and fixes.\n**Answer:** Backprop multiplies many local derivatives; in deep nets the product shrinks to ~0 (early layers stop learning) or blows up (unstable training). Fixes, and what each does: **ReLU-family activations** (derivative 1 in the active region, vs sigmoid's ≤0.25); **careful init** (He/Xavier keeps activation scale constant across layers); **BatchNorm/LayerNorm** (re-normalizes activations so gradients stay well-scaled); **residual connections** (gradient highways past layers — the key trick that made 100+ layer nets trainable); **gradient clipping** for explosions (standard in RNNs/transformer training).\n\n### Q15. What do BatchNorm and Dropout do? Train vs inference difference?\n**Answer:** **BatchNorm**: normalizes each channel to zero-mean/unit-variance over the mini-batch (then learnable scale/shift) — stabilizes and speeds training, allows higher learning rates. Train: batch statistics; inference: running averages collected during training — a classic source of train/serve bugs. **Dropout**: randomly zeroes activations with probability p during training so units can't co-adapt — an implicit ensemble; at inference dropout is off. Both are why `model.train()` vs `model.eval()` in PyTorch matters — forgetting `eval()` at serving time is a real production bug interviewers love asking about.\n\n### Q16. Adam vs SGD — what does Adam actually do?\n**Answer:** Adam keeps per-parameter running averages of gradients (first moment = momentum) and squared gradients (second moment), and scales each parameter's step by 1/√(second moment) — parameters with consistently large gradients get smaller steps, rare/small-gradient parameters get larger ones. Result: fast, robust convergence with little tuning — the practical default (AdamW, which fixes weight-decay handling, for transformers). SGD+momentum can generalize slightly better in some vision tasks but needs careful LR schedules. Honest answer: \"AdamW with warmup+cosine decay is the boring correct choice; I'd only deviate with evidence.\"\n\n### ⭐ Q17. Explain attention and why transformers replaced RNNs.\n**Answer:** Attention lets every token directly gather information from every other token, weighted by learned relevance: each token emits a query, key, and value vector; attention weights = softmax(QKᵀ/√d); output = weighted sum of values. Multi-head = several attention patterns in parallel (syntax, coreference, position...). Why it won over RNNs: (1) no sequential bottleneck — RNNs squeeze history through a fixed hidden state and process token-by-token; attention is direct token-to-token and **fully parallel across the sequence**, so training scales to internet-size data; (2) constant path length between any two positions → long-range dependencies actually learnable. Cost: O(n²) in sequence length — the reason long-context is expensive and a whole research area exists around it. (Build one from scratch in Karpathy's GPT lecture and this question becomes easy.)\n\n### Q18. What are embeddings, and how would you build semantic search?\n**Answer:** Learned dense vectors where semantic similarity ≈ geometric closeness. Words, sentences, images, users — anything can be embedded. Semantic search: embed the corpus offline → store in a vector index (exact search until ~100k items; approximate-NN like HNSW beyond) → embed the query → top-k by cosine similarity. Production notes: hybrid with keyword search (BM25) for exact identifiers; a cross-encoder reranker over the top-50 lifts quality; chunking strategy matters more than the embedding model choice in most RAG systems.\n\n---\n\n## Part 3 — LLM / GenAI\n\n### ⭐ Q19. Pretraining vs supervised fine-tuning vs RLHF — what does each stage give you?\n**Answer:** (1) **Pretraining**: next-token prediction over massive text → raw capability: language, knowledge, reasoning patterns. Produces a document-completer, not an assistant. (2) **Supervised fine-tuning (SFT)**: train on curated (instruction → good response) pairs → teaches the *format* of being helpful. (3) **RLHF/preference tuning**: humans rank outputs; the model is optimized toward preferred responses (via a reward model + RL, or directly via DPO) → nudges tone, helpfulness, and refusal behavior — things easier to *rank* than to *write*. One-liner: \"pretraining gives capability, SFT gives the assistant format, preference tuning gives judgment.\"\n\n### ⭐ Q20. RAG vs fine-tuning — how do you choose?\n**Answer:** RAG adds **knowledge** (private/fresh docs, citations, updateable without retraining — the default for enterprise Q&A). Fine-tuning adds **behavior** (format, style, domain reasoning; or distilling a big prompted model into a small cheap one). Fine-tuning is the wrong tool for injecting facts — coverage is unreliable, updates need retraining, no citations. They compose: RAG for the knowledge, a fine-tune for how to use it. Decision heuristic to say out loud: \"does the model *not know* something (→ RAG) or *not behave* correctly (→ prompt first, then fine-tune)?\"\n\n### ⭐ Q21. How do you evaluate an LLM application when there's no single right answer?\n**Answer:** (1) Decompose: for RAG, measure retrieval (recall@k against labeled relevant chunks) separately from generation (faithfulness to retrieved context) — different failure modes, different fixes. (2) Build a **gold set** of 50–200 real examples with reference answers or graded rubrics. (3) **LLM-as-judge** with an explicit rubric (correctness, groundedness, completeness), validated against ~30 human labels before trusting it; use pairwise comparisons (A vs B) — more reliable than absolute scores. (4) Cheap deterministic checks where possible: exact match for extraction, schema validation for structured output, unit tests for generated code. (5) Production: sampled human review + user feedback signals, failures flow back into the gold set. Key sentence: \"prompts are code — evals are their test suite, run on every change.\"\n\n### Q22. What causes hallucinations and how do you reduce them?\n**Answer:** The model is trained to produce *plausible* continuations, not verified facts — when the answer isn't well-represented in training or context, it generates the most likely-sounding thing. Reductions, in order of leverage: ground with RAG + \"answer only from context\" instructions; require citations (auditable and reduces fabrication); check retrieval first — most RAG \"hallucinations\" are retrieval misses; lower temperature for factual tasks; eval-driven measurement of groundedness per release; guardrails/human review on high-stakes paths. Honest framing: you reduce and *measure* hallucination; you don't eliminate it.\n\n### Q23. What are LoRA and quantization?\n**Answer:** **LoRA**: instead of updating all weights during fine-tuning, freeze the model and learn small low-rank matrices (ΔW = A·B, rank r≪d) injected into attention/MLP layers — ~1% of trainable parameters, dramatically cheaper, adapters are swappable per task. **Quantization**: store weights at lower precision (8-bit/4-bit instead of 16) — 2–4× memory reduction with small quality loss, enabling big models on small GPUs. **QLoRA** combines both: fine-tune a 4-bit-quantized model with LoRA adapters — the standard budget fine-tuning recipe, and how you'd do the roadmap's fine-tuning exercises on a free Colab GPU.\n\n### Q24. Explain tokenization and its practical consequences.\n**Answer:** Models see subword tokens (BPE-style), not characters or words — common words = 1 token, rare words split into pieces; ~4 characters/token for English. Consequences worth naming: (1) cost and context limits are measured in tokens; (2) classic failure modes — counting letters in a word, arithmetic on long digit strings — trace to tokenization; (3) non-English text and code often tokenize less efficiently (more tokens → more cost); (4) same text, different tokenizer → different counts, so budget with the actual model's tokenizer.\n\n---\n\n## Part 4 — ML coding (from-scratch answers)\n\nInterviewers want: correct core logic, vectorized NumPy, narrated choices, and edge cases named.\n\n### ⭐ Q25. Linear regression with gradient descent (NumPy only).\n```python\nimport numpy as np\n\ndef fit_linear_regression(X, y, lr=0.01, epochs=1000):\n    X = np.c_[np.ones(len(X)), X]        # bias column\n    w = np.zeros(X.shape[1])\n    n = len(y)\n    for _ in range(epochs):\n        grad = (2 / n) * X.T @ (X @ w - y)   # d/dw of MSE\n        w -= lr * grad\n    return w                              # w[0] = intercept\n```\n**Narrate:** \"MSE loss; its gradient is 2/n·Xᵀ(Xw−y); I fold the bias in as a ones-column. I'd standardize features first — gradient descent on unscaled features converges badly. Sanity checks: loss decreases monotonically for small lr; for the closed form, `np.linalg.lstsq` — I'd mention why we use GD anyway (scales to huge n, generalizes to models with no closed form).\"\n\n### ⭐ Q26. k-means from scratch.\n```python\ndef kmeans(X, k, iters=100, seed=0):\n    rng = np.random.default_rng(seed)\n    centers = X[rng.choice(len(X), k, replace=False)]\n    for _ in range(iters):\n        d = np.linalg.norm(X[:, None] - centers[None, :], axis=2)  # (n, k)\n        labels = d.argmin(axis=1)\n        new = np.array([X[labels == j].mean(axis=0) if (labels == j).any()\n                        else centers[j] for j in range(k)])\n        if np.allclose(new, centers):\n            break\n        centers = new\n    return labels, centers\n```\n**Edge cases to name:** empty clusters (keep old center or re-seed), sensitivity to init (k-means++ or multiple restarts, keep best inertia), must scale features, k chosen via elbow/silhouette, only finds convex blobs.\n\n### Q27. Precision, recall, F1 without sklearn.\n```python\ndef prf1(y_true, y_pred):\n    tp = sum(1 for t, p in zip(y_true, y_pred) if t == 1 and p == 1)\n    fp = sum(1 for t, p in zip(y_true, y_pred) if t == 0 and p == 1)\n    fn = sum(1 for t, p in zip(y_true, y_pred) if t == 1 and p == 0)\n    precision = tp / (tp + fp) if tp + fp else 0.0\n    recall    = tp / (tp + fn) if tp + fn else 0.0\n    f1 = 2 * precision * recall / (precision + recall) if precision + recall else 0.0\n    return precision, recall, f1\n```\n**Narrate:** division-by-zero guards (\"no positive predictions → precision undefined; I return 0 and would log a warning\"), and offer the extension: \"given probabilities instead of labels, I'd sweep thresholds to trace the PR curve and pick the operating point from business costs.\"\n\n### Q28. Train/validation split with stratification, from scratch.\n**Answer sketch:** group indices by class, shuffle within each class with a seeded RNG, take the same fraction from each class for validation, concatenate. Narrate *why*: with imbalanced classes, a random split can starve validation of the minority class, making metrics meaningless; the seed makes experiments reproducible. Mention `GroupKFold`-style logic if the same user generates multiple rows (group leakage, Q7).\n\n---\n\n## Part 5 — ML system design: worked example\n\n### ⭐ Q29. \"Design a spam detector for an email product.\" (45 min)\n\n**1. Clarify (5 min):** Scale (emails/day)? Latency budget (inline before inbox delivery — say ~100ms)? Cost of each error — false positive (real mail in spam) is far worse than a miss. Existing labels (\"report spam\" / \"not spam\" buttons = free labeling stream)? Personalized or global?\n\n**2. Metrics before models:** business metric: user-visible spam rate *and* false-positive rate on legit mail (asymmetric — set FP budget first, e.g., \u003c0.1%). Model metric: precision at a recall floor, PR-AUC. Say explicitly: \"threshold tuned to the FP budget, not 0.5.\"\n\n**3. Baseline first:** rules + a linear model over simple features (sender reputation, auth results SPF/DKIM, keyword/URL stats) — cheap, explainable, and the benchmark any fancy model must beat. This sentence is a hire signal.\n\n**4. Data & features:** labels from user reports (noisy — users misreport; aggregate/weight), text features (subject/body n-grams → embeddings later), sender/infra features (domain age, IP reputation, volume patterns), user-interaction features. Name the leakage trap: features must be computable *at delivery time*.\n\n**5. Model evolution:** logistic regression → gradient boosting on tabular+text features → small transformer on text only if the gap justifies latency/cost. Ensemble text score with infra features.\n\n**6. Serving:** inline scoring service at ~100ms budget: cache sender-level features, precompute reputations, keep the model small; fallback = rules-only path if the model service degrades. Never fail-open silently — log and alert.\n\n**7. The adversarial + feedback loop (what separates senior answers):** spammers adapt → static models decay. Continuous retraining on fresh labels, monitor drift (score distributions, FP-report rate), canary new models on a traffic slice, keep a human-review queue for borderline scores. Also: attackers probe — rate-limit feedback signals so they can't reverse-engineer thresholds.\n\n**8. Close with iteration plan:** \"Ship baseline behind the FP budget → instrument → the first month's data tells us whether text or infra features carry more signal → invest there.\"\n\n---\n\n## Part 6 — Production / MLOps\n\n### ⭐ Q30. Your model performs great offline but poorly in production. Debug it.\n**Answer:** Work the funnel in order: (1) **training/serving skew** — is the *same* feature computation running in both places? (most common cause; a pandas transform offline vs a different SQL transform online); (2) **leakage in offline eval** — was the offline number ever real? check split hygiene, temporal splits; (3) **distribution shift** — compare production input distributions to training (new user segment, seasonality, upstream schema change silently nulling a feature); (4) **feedback delay/label mismatch** — are we measuring the same target we trained on? (5) **degenerate slices** — aggregate metrics can hide one segment failing; slice by user type, geography, time. Tooling answer: log features at serving time and replay them offline — if offline model on logged features ≠ production behavior, it's infrastructure; if =, it's data/distribution.\n\n### Q31. What is drift and how do you monitor it?\n**Answer:** **Data drift**: input distribution changes (new demographics, upstream changes). **Concept drift**: the input→label relationship changes (fraud tactics evolve). **Label/prior drift**: class balance shifts. Monitoring: statistical distance between live and training feature distributions (PSI/KS per feature), prediction-distribution monitoring (a score histogram that suddenly shifts is an alarm even without labels), delayed-label metric tracking where ground truth eventually arrives, and canary sets. Response: alert thresholds → investigate root cause → retrain on fresh data (scheduled or trigger-based). Key line: \"monitor predictions *and* inputs — labels usually arrive too late to be your only signal.\"\n\n### Q32. Batch vs online serving — how do you choose?\n**Answer:** **Batch** (precompute nightly, serve from a table): when predictions are needed on a schedule or for known entities (churn scores, recommendations refreshed daily). Cheap, simple, tolerant of slow models. **Online** (model behind an API): when the input only exists at request time (fraud scoring a live transaction, search ranking). Costs: latency engineering, feature freshness (feature store to avoid skew), autoscaling, fallbacks. Hybrid is common: heavy user embeddings batch-precomputed + light online model combining them with request-time features. Choose by: \"when is the input known, and how fresh must the answer be?\"\n\n### Q33. How would you A/B test a new model?\n**Answer:** Randomize at the right unit (usually user, not request — request-level randomization contaminates user experience and violates independence), define the primary business metric and guardrail metrics up front, run a power calculation for duration (don't peek-and-stop), watch for novelty effects, and check *segment-level* results before shipping (a win on average can lose on a key segment). For risky models: shadow mode first (score silently, compare offline) → canary (1–5% traffic) → ramp. Mention interference honestly if it's a marketplace/social product (treatment users affect control users).\n\n### Q34. Walk through your retraining strategy.\n**Answer:** Decide trigger: scheduled (weekly/monthly — simple, predictable) vs performance-triggered (drift/metric alarms — responsive, needs solid monitoring). Pipeline must be fully automated and reproducible: data validation (schema + distribution checks — bad data in, bad model out), training with versioned data/code/params, offline eval against the incumbent on a fixed benchmark *plus* recent data, auto-promote only if it wins with margin, deploy via canary, keep instant rollback. Log everything (model registry). One-liner: \"retraining isn't an event, it's a tested pipeline — if retraining scares you, your pipeline isn't done.\"\n\n### Q35. A stakeholder demands to know why the model rejected a customer. What do you do?\n**Answer:** Two levels: (1) **instance-level explanation** — SHAP values show which features pushed this specific prediction and in which direction (\"high utilization + short credit history dominated\"); LIME is the local-approximation alternative. (2) **process answer** — in regulated domains (credit: adverse-action notices) explainability is a legal requirement, so model choice must anticipate it: either interpretable-by-design (scorecards, monotonic GBMs) or a validated explanation pipeline. Also flag: check the *feature*, not just the math — if the explanation surfaces a proxy for a protected attribute, that's a bias problem to escalate, not explain away.\n\n---\n\n## Part 7 — Behavioral (quick reference)\n\nSame STAR structure as the [FDE bank](../fde/qa-bank.md) Part 6 (ownership, being wrong, deadline, explaining to non-technical people). Two MLE-specific ones:\n\n### Q36. \"Tell me about a model/project that failed.\"\n**Skeleton:** pick a real one (Kaggle overfit, a feature that leaked, a project where the baseline won). Structure: what you expected → what happened → how you *diagnosed* it (the part they're hiring) → what changed in your process (\"I now always run a leakage audit / always ship the baseline first\"). Never pick a fake failure (\"I worked too hard\").\n\n### Q37. \"How do you decide a problem doesn't need ML?\"\n**Answer pattern:** \"If rules solve it to the required quality, rules win — they're debuggable, predictable, and free. ML earns its complexity when the pattern is too nuanced to enumerate, the payoff justifies the infrastructure, and there's data + a feedback loop to keep it healthy. In interviews and at work I say the same thing: baseline first, and let the gap justify the model.\" Cite Google's Rules of ML #1: don't be afraid to launch without ML.\n\n---\n\n## How to drill this bank\n\n- **Parts 1–3 (breadth):** 5 questions/day out loud, as if teaching. Stumble → reread source in [resources.md](resources.md) → retry tomorrow.\n- **Part 4 (coding):** type them from a blank file, timed 30 min each; then daily [Deep-ML](https://www.deep-ml.com/) problems keep it sharp.\n- **Part 5 (design):** whiteboard the spam case yourself *before* reading the answer, then diff; repeat weekly with new prompts from [Evidently's case database](https://www.evidentlyai.com/ml-system-design).\n- **Parts 6–7:** rehearse with a friend interrupting with \"why?\" — production questions are conversations, not recitals.\n", "tasks": 0}, {"id": "resources", "file": "resources.md", "title": "Resources", "md": "# AI/ML Engineer Free Resources\n\nEverything the [roadmap](roadmap.md) links to, plus alternatives. All free (audit/free tier at most). One primary per topic — finish, don't collect.\n\n## Python & data wrangling\n- **[CS50P — Harvard Python](https://cs50.harvard.edu/python/)** — if fundamentals are shaky. *(selective, ~15 hrs)*\n- **[Kaggle Learn](https://www.kaggle.com/learn)** — Pandas, Data Viz, Intro/Intermediate ML micro-courses; in-browser, free certificates. *(~12 hrs total)*\n\n## Math intuition\n- **[3Blue1Brown — Essence of Linear Algebra](https://www.3blue1brown.com/topics/linear-algebra)** — vectors to eigenvalues, visually; all you need to *understand* what models do. *(~4 hrs)*\n- **[StatQuest (YouTube)](https://www.youtube.com/@statquest)** — stats + ML concepts explained simply; the bias/variance and regularization videos are interview gold. *(~6 hrs selectively)*\n- Alt: [Khan Academy — Statistics](https://www.khanacademy.org/math/statistics-probability) for structured stats practice.\n\n## Classic ML\n- **[Andrew Ng — ML Specialization](https://www.coursera.org/specializations/machine-learning-introduction)** — the canonical course; audit each course free (click \"Audit\" at enrollment). Course 1 + half of Course 2 covers the interview core. *(~25 hrs)*\n- **[Google ML Crash Course](https://developers.google.com/machine-learning/crash-course)** — faster alternative (~15 hrs), well-produced, good production framing.\n- **[scikit-learn User Guide](https://scikit-learn.org/stable/user_guide.html)** — reference while doing Kaggle work.\n- Deeper theory (optional): [Stanford CS229 lectures (YouTube)](https://www.youtube.com/playlist?list=PLoROMvodv4rMiGQp3WXShtMGgzqpfVfbU) + [Shervine's CS229 cheatsheets](https://stanford.edu/~shervine/teaching/cs-229/).\n- **Your video track: Krish Naik's Udemy DSAI bootcamp** (purchased) + his [YouTube channel](https://www.youtube.com/@krishnaik06) for anything the course skips. Use it as the *lecture* layer and map each course section to this roadmap's milestone projects (course EDA/ML sections → week 1–2 Kaggle milestones; DL/NLP sections → week 3–4 PyTorch and RAG projects). Passive watching without the projects is the #1 way this prep fails.\n\n## Deep learning\n- **[Karpathy — Neural Networks: Zero to Hero](https://karpathy.ai/zero-to-hero.html)** — backprop → GPT, built from scratch in code. The best \"explain how it actually works\" prep in existence. *(~16 hrs for lectures 1–4 + GPT)*\n- **[PyTorch — Learn the Basics](https://pytorch.org/tutorials/beginner/basics/intro.html)** — official tutorial track. *(~5 hrs)*\n- **[fast.ai — Practical Deep Learning for Coders](https://course.fast.ai/)** — top-down complement: ship a model in lesson 1. *(lesson 1–2, ~4 hrs; whole course if you have time after week 6)*\n\n## Transformers & LLMs\n- **[Hugging Face LLM Course](https://huggingface.co/learn/llm-course)** — tokenizers, pretrained models, fine-tuning with Trainer. *(~8 hrs for ch. 1–3)*\n- **[Anthropic courses (GitHub)](https://github.com/anthropics/courses)** — free notebooks: API, prompting, tool use, evals. *(~6 hrs)*\n- **[DeepLearning.AI short courses](https://www.deeplearning.ai/short-courses/)** — free ~1.5 hr courses on fine-tuning, RAG, agents, evals; pick by gap. *(~3 hrs)*\n- Alt: [Hugging Face Agents Course](https://huggingface.co/learn/agents-course) if targeting agent-heavy roles.\n\n## Evals\n- **[Hamel Husain — Your AI Product Needs Evals](https://hamel.dev/blog/posts/evals/)** — the canonical practitioner essay. *(~1 hr)*\n\n## Production ML / MLOps\n- **[Made With ML](https://madewithml.com/)** — free end-to-end production ML course (design → data → modeling → deployment → testing → monitoring). *(~10 hrs selectively)*\n- **[Docker — Get Started](https://docs.docker.com/get-started/)** — enough Docker to containerize a model server. *(~3 hrs)*\n- **[FastAPI tutorial](https://fastapi.tiangolo.com/tutorial/)** — the de-facto model-serving framework. *(~4 hrs)*\n- **[Google — Rules of ML](https://developers.google.com/machine-learning/guides/rules-of-ml)** — 43 rules of production ML; quotable in interviews. *(~1 hr)*\n\n## ML system design & interviews\n- **[Chip Huyen — ML Systems Design booklet](https://huyenchip.com/machine-learning-systems-design/toc.html)** — free; the framework used in [interview-prep.md](interview-prep.md). *(~4 hrs)*\n- **[Chip Huyen — Intro to ML Interviews Book](https://huyenchip.com/ml-interviews-book/)** — free online; landscape, timelines, what companies test. *(~3 hrs selectively)*\n- **[Evidently AI — ML system design database](https://www.evidentlyai.com/ml-system-design)** — 300+ real case studies searchable by industry. *(~3 hrs for 5 cases)*\n\n## Practice platforms\n- **[Deep-ML](https://www.deep-ml.com/)** — LeetCode-style implement-ML-from-scratch problems; mirrors the ML coding round. *(1/day habit)*\n- **[NeetCode Roadmap](https://neetcode.io/roadmap)** — for the general-coding screen; first 2–3 patterns suffice for most MLE loops. *(~10 hrs)*\n- **[Kaggle Competitions](https://www.kaggle.com/competitions)** — Getting Started tier for portfolio pieces.\n- **[Pramp](https://www.pramp.com/)** — free peer-to-peer mock interviews.\n- **[SQLBolt](https://sqlbolt.com/)** + **[SQL Practice](https://www.sql-practice.com/)** — SQL screens are common for MLE.\n\n## Free certifications (résumé line items)\n\nCertificates don't replace the portfolio, but they pass résumé filters and prove initiative. All genuinely free:\n\n- **[freeCodeCamp — Machine Learning with Python](https://www.freecodecamp.org/learn)** — the most substantial fully-free ML certification (TensorFlow-based projects graded in-browser); also Data Analysis with Python.\n- **[Kaggle Learn certificates](https://www.kaggle.com/learn)** — Pandas, Intro/Intermediate ML, Feature Engineering micro-certs; earn them naturally during weeks 1–2 of the roadmap.\n- **[Hugging Face Agents Course certificate](https://huggingface.co/learn/agents-course)** — pass the GAIA final challenge; strong signal for GenAI-flavored MLE roles.\n- **[Databricks Academy — free self-paced trainings](https://www.databricks.com/learn/training/home)** — free Generative AI Fundamentals accreditation; recognized in data-engineering-adjacent MLE roles.\n- **[Google ML Crash Course](https://developers.google.com/machine-learning/crash-course)** — no formal cert, but completion + the follow-on [Google Cloud Skills Boost free GenAI badges](https://www.cloudskillsboost.google/) cover the \"Google stack\" line.\n- **[Elements of AI](https://www.elementsofai.com/)** — free University of Helsinki certificate; non-technical but a fine first badge.\n- **[Microsoft Learn — AI training paths](https://learn.microsoft.com/en-us/training/)** — free modules/badges toward Azure AI & Data Science fundamentals (training free; proctored exam paid — the free training alone is résumé-relevant).\n\nPriority for MLE: freeCodeCamp ML with Python → Kaggle certs → HF Agents cert. Then stop collecting and build portfolio pieces — interviewers ask about projects, not badges.\n\n## Project fuel\n- **[Kaggle Datasets](https://www.kaggle.com/datasets)** — datasets for every milestone.\n- **[Excalidraw](https://excalidraw.com/)** — whiteboard for system-design practice.\n", "tasks": 0}]}, {"slug": "computer-vision-engineer", "name": "Computer Vision Engineer", "docs": [{"id": "README", "file": "README.md", "title": "Overview", "md": "# Computer Vision Engineer\n\n## What the role is\n\nA Computer Vision Engineer builds systems that understand images and video: detecting defects on production lines, reading medical scans, powering robot/vehicle perception, tracking objects in video, and increasingly wiring vision-language models (CLIP, SAM, VLMs) into products. In 2026 the role spans two layers:\n\n- **Classical + deep CV core**: image processing (OpenCV), CNNs, object detection, segmentation, tracking — still the daily bread of most CV jobs.\n- **Modern vision stack**: vision transformers, CLIP-style zero-shot models, SAM, and multimodal VLMs — the fastest-growing interview topic.\n\nCV is more *specialized* than generalist AI/ML: fewer openings, but also fewer qualified candidates, and demand is expanding fast (manufacturing inspection, healthcare imaging, autonomy, video analytics).\n\n## Who hires\n\n| Segment | Notes |\n|---|---|\n| Autonomy & robotics (Tesla, Zoox, drone/robotics startups) | Perception teams; strongest engineering bar; C++ often appears. |\n| Manufacturing / industrial QA | Defect detection, metrology; underrated, lots of openings, practical OpenCV + detection skills. |\n| Healthcare imaging | Segmentation-heavy; regulatory awareness is a plus. |\n| Big tech (Meta, Apple, NVIDIA, Google) | AR/VR, camera pipelines, foundation vision models; MLE loop + CV depth. |\n| Retail/security video analytics | Detection + tracking + edge deployment; startup-heavy, portfolio-driven. |\n\n## Prerequisites (don't skip)\n\nThis track **builds on the [AI/ML Engineer roadmap](../ai-ml-engineer/roadmap.md) weeks 1–3** (Python/NumPy, classic ML basics, PyTorch + backprop). If you're following the Krish Naik course, its Python/ML/DL sections cover the same ground — finish those first, then start here.\n\n## The skills profile\n\n- **Core**: image fundamentals (color spaces, filtering, edges, transforms), OpenCV fluency, CNNs and training craft (augmentation, transfer learning), detection (IoU/mAP/NMS, YOLO-family), segmentation.\n- **Modern (2026 must-have)**: ViT, CLIP zero-shot, SAM, VLM basics.\n- **Production**: ONNX export, quantization, real-time video pipelines, latency budgets on edge hardware, drift/domain-shift debugging.\n- **Interview extras**: implement IoU/NMS/convolution from scratch; CV system design (a camera-to-decision pipeline).\n\n## What's in this package\n\n| File | What it's for |\n|---|---|\n| [roadmap.md](roadmap.md) | 6-week intensive CV plan (~3–4 hrs/day) on top of the AI/ML fundamentals |\n| [interview-prep.md](interview-prep.md) | CV interview loops, question bank by round, drill schedule |\n| [qa-bank.md](qa-bank.md) | Detailed questions **with answers**: fundamentals, from-scratch code (IoU, NMS, convolution), worked system design |\n| [resources.md](resources.md) | Free resources + the three **free official OpenCV certifications** |\n\n## Why this track pairs well with your OpenCV contribution plan\n\nWeeks 1–2 make you a fluent OpenCV *user* (the free official bootcamp + a real project), which is exactly the base you need before contributing: you'll recognize real issues, understand the module layout, and can credibly pick up `good first issue` tickets. Week 6 includes a structured contribution push.\n", "tasks": 0}, {"id": "roadmap", "file": "roadmap.md", "title": "Roadmap", "md": "# Computer Vision Engineer Roadmap — 6 Weeks Intensive (~3–4 hrs/day)\n\n**Prerequisite:** [AI/ML Engineer roadmap](../ai-ml-engineer/roadmap.md) weeks 1–3 (Python/NumPy, classic ML, PyTorch + backprop) or the equivalent Krish Naik course sections. Every task links to a free resource (details in [resources.md](resources.md)).\n\n---\n\n## Week 1 — Image fundamentals + OpenCV (with free official cert)\n\n**Goal:** think in pixels; be fluent in OpenCV.\n\n- [ ] Day 1–3: [OpenCV Bootcamp](https://opencv.org/university/free-opencv-course/) — the free official course: image/video manipulation, filtering, edge detection, object detection & tracking, face detection, DNN module. Finish it and **collect the free certificate**. *(~3 hrs of video + do every notebook)*\n- [ ] Day 3–5: Go deeper on fundamentals with the [OpenCV Python tutorials](https://docs.opencv.org/4.x/d6/d00/tutorial_py_root.html): color spaces, thresholding, morphology, contours, histograms, geometric transforms, feature matching (ORB/SIFT).\n- [ ] Day 5–6: Classical CV mini-drills (no deep learning allowed): count coins in an image; deskew a scanned document; isolate one color object from video.\n- [ ] Day 7: Read how convolution/filters actually work — [CS231n notes on convolution](https://cs231n.github.io/convolutional-networks/) (first half; the CNN part continues next week).\n\n**Milestone project:** a **document scanner** (detect page edges → perspective transform → adaptive threshold → readable output) or **lane detector** on dashcam footage — classical CV only, OpenCV, with a README showing before/after frames. Portfolio piece CV-1. *(~5 hrs)*\n\n---\n\n## Week 2 — CNNs + training craft\n\n**Goal:** understand and train CNNs properly; this is the depth interviews probe.\n\n- [ ] Day 1–3: [CS231n](https://cs231n.github.io/) — CNN notes + lectures (convolution arithmetic, receptive fields, pooling, architectures: ResNet ideas). Watch the [lecture videos](https://www.youtube.com/playlist?list=PLoROMvodv4rMiGQp3WXShtMGgzqpfVfbU) selectively; the written notes are the gold.\n- [ ] Day 3–4: [OpenCV's free PyTorch Bootcamp](https://opencv.org/university/free-pytorch-course/) — second free official cert; consolidates PyTorch training loops on vision tasks.\n- [ ] Day 4–6: Training craft, hands-on in PyTorch: transfer learning from a pretrained ResNet ([PyTorch tutorial](https://pytorch.org/tutorials/beginner/transfer_learning_tutorial.html)), data augmentation, LR schedules, early stopping. Log experiments properly.\n- [ ] Day 7: Interpretability: apply Grad-CAM to your model; write 5 sentences on what it attends to and one failure it explains.\n\n**Milestone project:** fine-tune a classifier on a *real* dataset (defects, plant disease, X-ray — pick from [Kaggle](https://www.kaggle.com/datasets)) — augmentation ablation (with/without), confusion matrix, Grad-CAM panel, 300-word error analysis. Portfolio piece CV-2. *(~5 hrs)*\n\n---\n\n## Week 3 — Object detection & segmentation\n\n**Goal:** own the IoU/mAP/NMS layer and train custom detectors — the most-asked CV interview topics.\n\n- [ ] Day 1–2: Theory first, from scratch: implement **IoU**, **NMS**, and read how **mAP** is computed (worked answers in [qa-bank.md](qa-bank.md)). Understand anchor-based vs anchor-free, one-stage vs two-stage.\n- [ ] Day 2–4: Train a custom [YOLO detector (Ultralytics docs)](https://docs.ultralytics.com/) on your own dataset — label ~200 images with [Roboflow's free tier](https://roboflow.com/) or [Label Studio](https://labelstud.io/) (open source).\n- [ ] Day 5–6: Segmentation: semantic vs instance vs panoptic; train/fine-tune a U-Net or run [SAM](https://github.com/facebookresearch/segment-anything) for promptable segmentation; combine SAM with your detector.\n- [ ] Day 7: Evaluation deep-dive on your detector: PR curves per class, failure gallery (small objects? occlusion? lighting?), one targeted fix, re-measure.\n\n**Milestone project:** end-to-end **custom detector** (your dataset → labeled → trained → evaluated with mAP + failure analysis + the one-fix iteration). This is the project interviewers will grill — know every choice. Portfolio piece CV-3. *(~6 hrs)*\n\n---\n\n## Week 4 — Modern vision: ViT, CLIP, SAM, VLMs\n\n**Goal:** the 2026 differentiator layer.\n\n- [ ] Day 1–2: [Hugging Face Community Computer Vision Course](https://huggingface.co/learn/computer-vision-course/unit0/welcome/welcome) — Vision Transformer units: patch embeddings, attention for images, ViT vs CNN trade-offs.\n- [ ] Day 3–4: CLIP: how contrastive image-text pretraining enables zero-shot classification; build a zero-shot classifier and compare against your week-2 supervised model on the same data.\n- [ ] Day 5–6: [OpenCV's free Vision-Language Model Bootcamp](https://opencv.org/university/vision-language-model-bootcamp/) — third free official cert: CLIP → VLMs for captioning/detection.\n- [ ] Day 7: Skim one modern topic that matches your target segment: video understanding / 3D basics / diffusion-for-vision — HF CV course has units for each. **Thesis synergy: the [VL-JEPA concepts track](../vl-jepa-concepts/roadmap.md) phases 2–4 (transformers, JEPA, CLIP) overlap this week — do them together. Prep the thesis as an interview asset with [qa-bank Q21](qa-bank.md).**\n\n**Milestone project:** **semantic image search** over your own photo folder (CLIP embeddings + cosine search + simple UI) *or* a zero-shot quality-inspection demo. Portfolio piece CV-4. *(~5 hrs)*\n\n---\n\n## Week 5 — Production CV: real-time, edge, system design\n\n**Goal:** the production sense that separates hired from rejected.\n\n- [ ] Day 1–2: Real-time pipeline: webcam → detector → tracker (ByteTrack/OpenCV trackers) → overlay, measuring FPS honestly; find and fix your bottleneck (resolution? batch? model size?).\n- [ ] Day 3–4: Deployment: export to [ONNX](https://onnxruntime.ai/) → quantize → benchmark CPU latency before/after; read how [TensorRT](https://developer.nvidia.com/tensorrt)-style optimization works conceptually.\n- [ ] Day 5: Domain shift — the #1 production CV failure: why models die when the camera/lighting/site changes; mitigation (augmentation matched to deployment, continual eval sets, monitoring confidence distributions).\n- [ ] Day 6–7: CV system design practice (framework in [interview-prep.md](interview-prep.md)) — two timed 45-min designs on [Excalidraw](https://excalidraw.com/): \"factory defect detection line\" and \"retail shelf monitoring\".\n\n**Milestone:** real-time demo video (screen capture) + latency table (FP32 vs quantized) + one polished system-design doc. Portfolio piece CV-5. *(~5 hrs)*\n\n---\n\n## Week 6 — Interviews + OpenCV contribution push\n\n**Goal:** convert to offers, and start the open-source track you planned.\n\n- [ ] Drill [qa-bank.md](qa-bank.md) daily: 5 concept questions out loud + 1 from-scratch coding rep (IoU, NMS, convolution — rotate).\n- [ ] 2× timed CV system designs (new prompts: parking occupancy, medical segmentation pipeline).\n- [ ] 1× project deep-dive rehearsal on your detector (CV-3) with a friend grilling: \"why this augmentation? why is mAP@0.5 misleading? what breaks at night?\"\n- [ ] General coding stays warm: 1–2 [NeetCode](https://neetcode.io/roadmap) problems/day.\n- [ ] **OpenCV contribution track**: read the [contribution guide](https://github.com/opencv/opencv/wiki/How_to_contribute), build OpenCV from source once, pick 2–3 [good first issues](https://github.com/opencv/opencv/issues?q=is%3Aissue+is%3Aopen+label%3A%22good+first+issue%22) (docs/tutorials/Python tests are realistic entries), submit one small PR. Expect slow review — that's normal; the PR link goes on your résumé the day it's *opened*.\n- [ ] Portfolio README linking CV-1…CV-5 + the three OpenCV certs + your PR; apply (manufacturing QA and video-analytics startups are the friendliest entry points; perception teams after).\n\n**Final milestone:** full self-run loop — CV coding (60') → CV depth Q&A (45') → system design (60') → project deep-dive (30') → behavioral (30'). Rubric in [interview-prep.md](interview-prep.md).\n", "tasks": 26}, {"id": "interview-prep", "file": "interview-prep.md", "title": "Interview Prep", "md": "# Computer Vision Engineer Interview Prep\n\nCV loops mirror [ML Engineer loops](../ai-ml-engineer/interview-prep.md) — same structure, everything vision-flavored. Use the AI/ML pack for general ML rounds; this file covers what's different.\n\n---\n\n## The typical loop\n\n1. **Recruiter screen** (30 min)\n2. **Technical phone screen** (60 min) — CV concepts + a small implement-from-scratch exercise (IoU/NMS territory)\n3. **Onsite** (3–4 rounds):\n   - **Coding** — general DSA (lighter than SDE loops) *and/or* CV implementations\n   - **CV depth** — CNNs, detection, segmentation, modern vision; follow-the-thread on your projects\n   - **System design** — a camera-to-decision pipeline (defect detection, video analytics)\n   - **Project deep-dive** — your custom detector gets grilled\n4. **Behavioral** (30–45 min)\n\nSegment differences: **autonomy/robotics** adds C++ questions and 3D/geometry (calibration, epipolar basics); **medical** leans segmentation + metrics under class imbalance; **manufacturing/analytics startups** lean practical (OpenCV, deployment, edge latency); **big tech** adds a standard DSA round at LeetCode-medium level.\n\n---\n\n## Question bank by round\n\n### CV coding (implement from scratch — practice until automatic)\n- Compute IoU between two boxes (then: vectorize over N×M boxes)\n- Non-maximum suppression given boxes + scores\n- 2D convolution with padding/stride (NumPy, no libraries)\n- Bilinear interpolation / image resize\n- Connected components or flood fill on a binary mask\n- Compute mAP given predictions and ground truth (walk the logic)\n- Full worked answers with code: [qa-bank.md](qa-bank.md) Part 3.\n\n### CV depth (know cold)\n- Why convolution for images? (parameter sharing, translation equivariance, locality)\n- Receptive field: what it is, how to grow it (stride, dilation, depth) and why it matters for small/large objects\n- Pooling vs strided conv; what's lost, what's gained\n- BatchNorm at train vs inference (classic deployment-bug question)\n- Transfer learning: what to freeze, when, and why; when training from scratch is justified\n- Data augmentation: which transforms are safe for which tasks (horizontal flip: fine for cats, catastrophic for reading text or chirality-sensitive medical images)\n- One-stage vs two-stage detectors; anchor-based vs anchor-free\n- IoU / precision-recall / mAP@0.5 vs mAP@[.5:.95] — and when mAP misleads (class imbalance, small objects)\n- Why NMS is needed and its failure modes (crowded scenes); soft-NMS idea\n- Semantic vs instance vs panoptic segmentation; why Dice/IoU loss over pixel accuracy\n- Class imbalance in detection: focal loss intuition\n- ViT vs CNN: inductive biases, data requirements, when each wins\n- CLIP: how contrastive pretraining gives zero-shot classification; practical uses (search, labeling bootstrap)\n- SAM: what \"promptable segmentation\" means; where it fits in a labeling pipeline\n- Domain shift: why the lab model dies on the factory camera, and what you do about it\n- Edge deployment: quantization (what breaks), ONNX, latency/accuracy trade-offs, measuring FPS honestly\n\n### System design (the differentiator round)\nPrompts: *\"Design defect detection for a bottling line (30 bottles/sec)\"* · *\"Retail shelf-monitoring across 500 stores\"* · *\"Pedestrian detection for a delivery robot\"* · *\"Tumor segmentation pipeline for radiology\"*\n\n**Framework (adapted from the [ML design framework](../ai-ml-engineer/interview-prep.md)):**\n1. **Clarify**: error costs (miss vs false alarm), throughput/latency budget, edge vs cloud, camera control (can you fix lighting/mounting? huge lever),
