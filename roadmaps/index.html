terns > opinions — this tells you what to emphasize.\n- [ ] Check salary data so you negotiate from facts: [levels.fyi](https://www.levels.fyi/) for companies, board-listed ranges for startups. Note the going rate for \"AI engineer, 0–2 yrs, remote\".\n- [ ] Read the monthly [Hacker News \"Who is hiring?\"](https://news.ycombinator.com/submitted?id=whoishiring) thread — search for \"REMOTE\" — this is where small well-funded startups post, often without a formal process.\n- [ ] Write your baseline outreach materials: a 120-word cold email/DM template (who you are → one impressive specific thing → why them → ask), and a résumé that leads with projects, not education.\n\n**Milestone:** target list of 30 companies/roles, sorted into A (dream), B (good), C (practice).\n\n## Week 3–4 — Build the pipeline (volume + quality)\n\n- [ ] Apply to 5 roles/week minimum — start with C-list (practice), move to B/A as your materials improve. Tailor the first 2 résumé lines per application; don't hand-craft everything else.\n- [ ] Track every application in your spreadsheet: date, stage, follow-up date. Follow up once after 7 days — politely; it genuinely moves the needle.\n- [ ] Freelance track (Route B): create an [Upwork](https://www.upwork.com/) profile scoped to ONE offer (\"I build AI chatbots / document-Q&A systems for small businesses\"). Bid on 5 small jobs/week with a specific 3-sentence proposal referencing their actual problem. Expect 10–20 bids before the first win — the first review is the hard one.\n- [ ] Start one public artifact: a short write-up of your RAG + evals project on [dev.to](https://dev.to/) or [Hashnode](https://hashnode.com/) — remote offers disproportionately come through being findable.\n\n**Milestone:** 10+ applications out, 10+ freelance bids out, 1 article published.\n\n## Week 5–6 — Network like an engineer (not a spammer)\n\n- [ ] Open source: pick one AI tool you actually use ([MCP servers](https://modelcontextprotocol.io/), LangChain, a vector DB client) and land 2 small PRs — good first issues, docs fixes, small bugs. \"Contributor to X\" is remote-credibility currency.\n- [ ] 10 warm-ish DMs/emails per week: to engineers (not recruiters) at your A-list companies — ask one specific question about their work, not for a job. A fraction respond; some become referrals. Referral applications convert ~5–10× better than cold ones.\n- [ ] Join where remote AI people hang out: relevant Discords (framework communities), X/Twitter AI-builder circles. Share what you're building; ask good questions.\n- [ ] If Route C is live (local interviews), run them with the full [AI/ML interview prep](../ai-ml-engineer/interview-prep.md) — a local offer is negotiation leverage everywhere else.\n\n**Milestone:** 2 merged PRs, 3 real conversations with engineers at target companies.\n\n## Week 7–8 — Convert: interviews and offers\n\n- [ ] Drill the remote-specific rounds in [interview-prep.md](interview-prep.md): async communication test, take-home discipline, \"why remote/why you\" answers, timezone questions.\n- [ ] Rehearse the negotiation scripts (same file) out loud — the first unprepared \"what are your salary expectations?\" costs real money.\n- [ ] Take-homes: treat every one like the week-4 milestone of the AI/ML roadmap — working code, README, eval table, short video walkthrough. Most candidates skip the video; it's the single cheapest differentiator.\n- [ ] Keep the pipeline full: 5 applications + 5 bids/week continues until you sign. Pipelines die silently the week you stop feeding them.\n\n**Milestone:** first offers in hand — negotiate (scripts ready), and compare *total* value: salary + currency + growth + whether the work builds your next jump.\n\n---\n\n## After week 8 — the compounding loop\n\nThe 8 weeks build a machine; keep it running at ~30 min/day: 5 applications/week, 1 public write-up/month, open-source contributions when natural, spreadsheet always current. Typical fresher timelines to a signed remote/high-pay offer are 2–5 months of consistent pipeline — the people who fail mostly stopped in month 2.\n\nAnd re-read the honest math in the [README](README.md) monthly: if Route C (local first) produces a strong offer and Routes A/B haven't, **take it** — 18 months later you re-enter the remote market as mid-level, where the $60–100k offers actually live.\n", "tasks": 20}, {"id": "interview-prep", "file": "interview-prep.md", "title": "Interview Prep", "md": "# Remote Hiring: Interviews, Negotiation, Red Flags\n\nRemote loops test everything the normal loops test (use the [AI/ML interview prep](../ai-ml-engineer/interview-prep.md) for the technical rounds) **plus** an async-trust layer covered here.\n\n---\n\n## The typical remote-startup loop\n\n1. **Application + screening questions** — often written; your answers *are* an async-communication test\n2. **Recruiter/founder call** (30 min) — motivation, timezone, salary range (be ready — scripts below)\n3. **Take-home** (2–6 hrs) — the highest-weight stage at most remote startups; replaces or precedes live coding\n4. **Technical interview** (60–90 min) — take-home deep-dive + live problem\n5. **Collaboration/culture round** — async habits, communication, self-management\n6. **Offer + negotiation**\n\nStartups run this in 1–3 weeks. Silence for 2+ weeks usually means no — keep the pipeline full and move on.\n\n---\n\n## Remote-specific Q&A (with answers)\n\n### ⭐ \"Why should we hire someone remote and junior?\"\n**Answer pattern:** don't argue the category — show you're the exception with evidence: \"The usual risk with junior remote hires is that they need synchronous hand-holding. Here's my counter-evidence: I've shipped [project] end-to-end with written documentation good enough that you can run it without me in the room; my take-home included an eval table and a video walkthrough because I default to making my work inspectable; and I've [freelance client / open-source PRs] — delivered to people who only judged me on output. You'll see my work in the repo and my thinking in the PR descriptions, daily.\"\n\n### ⭐ \"How do you work when nobody's watching?\"\n**Answer pattern:** describe a *system*, not a virtue: \"Written plan each morning (3 outcomes, not tasks); work in public — draft PRs early, progress notes in the channel before anyone asks; timebox blockers — 45 minutes of honest effort, then I post a specific question with what I tried. The rule I hold myself to: nobody should ever have to ask me 'what's the status?'\"\n\n### ⭐ \"What's your timezone overlap / how do you handle async collaboration?\"\n**Answer:** know your overlap math before the call (IST: ~4 good hours with EU mornings; US East ~7:30 pm–11 pm IST; US West is hard — say honestly what you can sustain). Then: \"I front-load communication so overlap hours are for decisions, not status: questions written with context and my proposed answer, so a reviewer in another timezone can unblock me with one message. I've read how [GitLab's handbook](https://handbook.gitlab.com/) treats async as the default — that's how I like to work.\"\n\n### \"What salary are you expecting?\" (the trap question)\nSee the negotiation section below — never answer with a number first if you can avoid it, and never anchor in your local currency for a global role.\n\n### \"Have you worked remotely before?\"\n**Answer pattern (for a fresher):** reframe to remote-shaped evidence: \"Not employed remotely yet — but my open-source contributions were reviewed and merged by maintainers I've never met, my freelance clients judged me purely on delivered work, and my projects are documented so strangers can run them. That's the remote workflow: written communication, inspectable output, no supervision.\"\n\n---\n\n## Take-home rules (where remote offers are actually won)\n\n1. **Confirm scope and timebox in writing** before starting (\"I'll spend ~5 hours and prioritize X over Y — sound right?\"). This is itself a signal.\n2. Working > clever. A boring solution that runs from README instructions beats a brilliant one that doesn't.\n3. **Always include:** README (what/how/why), tests or an eval table, a \"what I'd do with more time\" section (shows judgment without doing the work), and a **5-minute video walkthrough** (Loom or plain screen recording) — almost nobody does this; it humanizes you and proves communication skill in one artifact.\n4. Deliver *early* if you can — remote teams notice reliability signals more than brilliance signals.\n\n---\n\n## Salary negotiation (scripts — rehearse out loud)\n\n### The rules\n- **Never give the first number** if avoidable; if forced, give a researched *range* anchored to the role's market, not your local market or current pay.\n- **Currency framing:** for global-remote roles, speak in USD annual. Anchoring in INR invites local-market pricing for global-market work.\n- **Your leverage is alternatives**, not arguments — which is why the roadmap keeps three routes running. One competing offer changes everything.\n- Negotiate **after** the offer, never during screening enthusiasm-checks.\n\n### Script 1 — deflecting the early \"salary expectations?\" question\n> \"I'd rather make sure there's a mutual fit first — comp-wise I'm confident we won't be far apart. Could you share the budgeted range for this role?\"\n\nIf they insist: give a range from your Week-2 research: \"Based on what I'm seeing for remote AI engineering at this level, something in the $X–$Y range, depending on the overall package.\"\n\n### Script 2 — responding to the offer (never accept on the call)\n> \"Thank you — I'm genuinely excited about this. Let me review the full package and get back to you by [day].\"\n\nThen, with any competing data point:\n> \"I'm ready to say yes at $X. [If true:] I'm also in process elsewhere at similar numbers, but this role is my first choice because [specific real reason]. Can we get there?\"\n\n### Script 3 — when the number is firm\nNegotiate the non-salary levers, in rough order of long-term value: **6-month review with defined raise criteria in writing** → equity → learning budget/conference → extra leave. The written 6-month review is the fresher's best lever: it converts \"prove yourself\" into a contract.\n\n### Contractor vs employee (know before you negotiate)\nGlobal startups hire internationally as **contractors** (you invoice monthly, handle your own taxes — common, legitimate) or via **EOR platforms** (Deel/Remote.com — you get local-law employment, benefits, but the company pays platform fees, so all-in budgets shrink slightly). Contractor rate math: a $60k employee package ≈ $65–70k contractor equivalent (you're covering benefits/taxes) — it's normal to ask for more as a contractor, and normal for them to expect it.\n\n---\n\n## Red flags & scams (remote job seekers are targets)\n\n- **Any \"job\" asking you to pay** — for equipment, training, deposits, \"processing\": scam, always.\n- Interviews only over chat, offer without any technical evaluation, pressure to accept in 24 hours: scam patterns.\n- **Unpaid \"trial projects\"** beyond a reasonable take-home (>1 day of work, or work suspiciously identical to their real product): decline politely or ask for a paid trial — legitimate startups pay for trials.\n- Salary \"in crypto,\" employer asking for your bank login, or checks to \"deposit and forward\": run.\n- Verify companies: real website + real employees on LinkedIn + posted on a reputable board. When in doubt, search \"[company] scam\" and check their domain age.\n", "tasks": 0}, {"id": "resources", "file": "resources.md", "title": "Resources", "md": "# Remote AI Career Resources\n\nAll free. Grouped by what they're for in the [roadmap](roadmap.md).\n\n## Job boards with real remote AI roles\n- **[Wellfound](https://wellfound.com/)** — startup jobs with listed salary ranges and remote filters; the best single board for AI startup roles. *(check 2×/week)*\n- **[Y Combinator — Work at a Startup](https://www.workatastartup.com/)** — YC companies, many remote-friendly and fast-moving; one profile, many applications.\n- **[Hacker News \"Who is hiring?\"](https://news.ycombinator.com/submitted?id=whoishiring)** — monthly thread (1st of each month); search \"REMOTE\". Small well-funded startups, often no formal funnel — a good cold email wins here.\n- **[We Work Remotely](https://weworkremotely.com/)** — the biggest remote-only board; programming section.\n- **[Himalayas](https://himalayas.app/)** — clean remote board with company timezone/location requirements shown up front (saves wasted applications).\n- **[Remotive](https://remotive.com/)** — remote-only, decent AI/engineering section.\n- **[RemoteOK](https://remoteok.com/)** — high volume; filter aggressively.\n- **[ai-jobs.net](https://ai-jobs.net/)** — AI/ML-specific listings incl. remote filters.\n- **LinkedIn** — set filters: Remote + posted last week + entry/associate; apply within 48 hrs of posting (application #400 doesn't get read).\n\n## Freelance (Route B)\n- **[Upwork](https://www.upwork.com/)** — largest market for the \"AI chatbot / document Q&A for small business\" niche. One specific offer, 5 bids/week.\n- **[Contra](https://contra.com/)** — commission-free freelance platform, growing AI category.\n- **[Fiverr](https://www.fiverr.com/)** — productized gigs (\"I'll build a RAG chatbot over your docs\"); works as inbound while you sleep.\n- Later, with experience: [Toptal](https://www.toptal.com/) / [Arc](https://arc.dev/) — screened networks with better rates.\n\n## Talent platforms (Route C accelerators, usually need ~1 yr experience)\n- **[Turing](https://www.turing.com/)** — matches Indian/global devs to US companies; vetting tests + steady USD contracts.\n- **[Arc](https://arc.dev/)** — remote-only developer matching.\n- **[Crossover](https://www.crossover.com/)** — standardized testing, full-time USD remote roles; demanding but transparent pay.\n\n## Salary data (negotiate from facts)\n- **[levels.fyi](https://www.levels.fyi/)** — real comp data; check \"Remote\" and India pages for calibration.\n- **[Glassdoor](https://www.glassdoor.com/)** — company-level salaries and interview reports (free account).\n- Wellfound listings — startups post ranges directly; collect them in your Week-2 spreadsheet.\n\n## Being findable (inbound > outbound over time)\n- **[GitHub Pages](https://pages.github.com/)** — free portfolio site.\n- **[dev.to](https://dev.to/)** / **[Hashnode](https://hashnode.com/)** — free technical blogging with built-in distribution; write up each portfolio project.\n- **[Loom](https://www.loom.com/)** — free screen-recording tier for take-home video walkthroughs.\n- Open source targets: [MCP servers](https://modelcontextprotocol.io/) (young ecosystem, easy meaningful contributions), [LangChain](https://github.com/langchain-ai/langchain) and friends (high visibility, lots of good-first-issues), [OpenCV](https://github.com/opencv/opencv) (prestigious but C++-heavy and a high review bar — start with issues labeled \"good first issue\", docs/tutorial fixes, or Python binding tests, and expect slow review cycles).\n\n## Remote work craft\n- **[GitLab Handbook](https://handbook.gitlab.com/)** — the canonical all-remote operating manual; read the communication chapter, quote it in interviews.\n- **[Deel blog](https://www.deel.com/blog/)** — how global contracting/EOR employment actually works (know what you're signing).\n- **[Wise](https://wise.com/)** — the standard for receiving USD payments in India at honest exchange rates (vs. bank wire fees).\n\n## Skill spine (from the other tracks)\n- Technical prep: [AI/ML Engineer roadmap](../ai-ml-engineer/roadmap.md) — your portfolio comes from there.\n- Client communication for freelancing: [FDE qa-bank Part 5](../fde/qa-bank.md) — discovery calls, handling pushback, delivering bad news.\n", "tasks": 0}]}, {"slug": "vl-jepa-concepts", "name": "VL-JEPA (Thesis)", "docs": [{"id": "README", "file": "README.md", "title": "Overview", "md": "# VL-JEPA Concepts (Thesis Track)\n\nThe learning curriculum behind **LiveJEPA** — the M.Tech thesis project: real-time video captioning built on VL-JEPA.\n\n> Source: this track is the formatted version of `LearningForVL-JEPA.md` (project root). That file remains the original; edit *here* going forward so the UI stays current (`python tools/build_ui.py` after edits).\n\n## What the project is\n\n**LiveJEPA sits on top of VL-JEPA** (Meta FAIR, [arXiv 2512.10942](https://arxiv.org/abs/2512.10942), ICLR 2026): instead of autoregressively generating caption tokens, VL-JEPA **predicts continuous embeddings of the target text** and only invokes a lightweight text decoder \"when needed.\" Selective decoding cuts decode operations ~2.85× vs uniform decoding while maintaining performance. The architecture: a **V-JEPA video encoder** + a **predictor initialized from a Llama decoder** + an **InfoNCE-style alignment loss** + a **SONAR-style invertible text embedding space**.\n\nLiveJEPA's original contribution lives in the *when-to-decode* decision: clustering / change-point detection over the predicted-embedding stream, emitting a caption only when a new event occurs.\n\n## The 7-phase curriculum (~80–110 h total)\n\n| Phase | Topic | Criticality |\n|---|---|---|\n| 0 | Orientation: skim the VL-JEPA paper | 🔴 |\n| 1 | Embeddings, similarity, PyTorch refresher | 🔴/🟡 |\n| 2 | Transformers & vision encoders (ViT, V-JEPA, Llama) | 🔴 |\n| 3 | **JEPA: predicting in representation space** | 🔴 most critical |\n| 4 | Contrastive learning, InfoNCE, CLIP | 🔴 |\n| 5 | Text embeddings & decoding (SBERT, SONAR) | 🟡 (SONAR 🔴) |\n| 6 | **Clustering & selective decoding (the novel contribution)** | 🔴 most critical |\n| 7 | Video understanding, streaming, metrics (CIDEr) | 🔴/🟡 |\n| 8 | Tooling (Hugging Face) — interleave throughout | 🟡 |\n\n**Triage principle:** Phases 3 and 6 above everything — they are what makes the project novel. If time is short, the irreducible 🔴-only path is ~45–55 h: Phases 0, 2A/2C/2D, 3 (all), 4A–4C, 6 (all), 7B/7E.\n\n## How this track relates to the others\n\n- **[CV roadmap](../computer-vision-engineer/roadmap.md)**: run both in parallel — CV weeks 1–3 build the general foundation (CNNs, detection); this track goes deep where the thesis lives (transformers, SSL, JEPA). CV week 4 (ViT/CLIP) overlaps Phase 2/4 here — do those the same week and each makes the other easier.\n- **[CV qa-bank Q21](../computer-vision-engineer/qa-bank.md)**: the interview-ready summary of JEPA vs MAE vs contrastive — your thesis depth-round script.\n- **The explain-it-back rule**: this project is being built with Claude Code's help. For every component the AI writes, explain it back in your own words in a running `notes.md`. Whatever you can't explain is the next thing to study from this curriculum. The thesis defense tests you, not the code.\n\n## Caveats (from the original research notes)\n\n- Most video URLs verified; a few (Yannic Kilcher's JEPA video ID, Aleksa Gordić CLIP video, StatQuest durations) should be double-checked on YouTube by title/channel.\n- No verified public CS231n transformer lecture video — CS224n 2023 Lecture 8 is the reliable substitute; CS231n 2024 slides linked as written companion.\n- **Selective-decoding mechanism**: the paper confirms adaptive/event-triggered decoding (~2.85× fewer decodes), but verify the *exact* trigger rule in §4.5 of the PDF — the clustering/change-point framing in Phase 6 is the right technique family, not a confirmed reproduction of the paper's rule.\n- Blog/Medium companions are intuition aids, not authorities — cross-check against the primary papers cited alongside them.\n", "tasks": 0}, {"id": "roadmap", "file": "roadmap.md", "title": "Roadmap", "md": "# VL-JEPA Curriculum — 6-Week Staging (~80–110 h)\n\n🔴 critical · 🟡 important · 🟢 background. Each week ends with a **benchmark** — don't advance until you pass it (explaining out loud counts; re-watching doesn't).\n\n| Week | Phases | Benchmark to advance |\n|---|---|---|\n| 1–2 | 0–2: Foundations + Transformers | Sketch the V-JEPA encoder/predictor data flow |\n| 3–4 | 3–4: JEPA + Contrastive/CLIP | Explain why embedding prediction avoids blurry-average losses; identify InfoNCE in the paper's loss |\n| 5 | 5–6: Text embeddings + selective decoding | Implement a toy \"decode-on-change\" loop on a synthetic embedding stream |\n| 6 | 7–8: Video/streaming + metrics + tooling | Compute CIDEr on a toy caption set; explain Recall@1 |\n| — | Capstone | Re-read the whole VL-JEPA paper; understand every component |\n\n---\n\n## Phase 0 — Orientation (½ day, ~3–4 h) 🔴\n\nRead the thing you're working toward *first*, lightly, so every later concept has a hook.\n\n- [ ] Skim the VL-JEPA paper abstract + figures — [arXiv 2512.10942](https://arxiv.org/abs/2512.10942) ([PDF](https://arxiv.org/pdf/2512.10942)). Delong Chen et al., Meta FAIR.\n- [ ] Plain-English overview: [Ben Dickson, TechTalks](https://bdtechtalks.com/2026/01/03/meta-vl-jepa-vision-language-model/).\n- [ ] **Goal check:** state in one sentence what LiveJEPA does and why \"predict the embedding, decode only when needed\" matters for real-time captioning.\n\n## Phase 1 — Foundations: embeddings, similarity, PyTorch (~10–14 h) 🔴/🟡\n\n- [ ] **1A** 🔴 [3Blue1Brown — \"But what is a GPT?\"](https://www.youtube.com/watch?v=yMQPQuz5WpA) (~27 min) — embeddings as directions-carry-meaning; the mental model the whole project rests on. Full refresher if needed: [Neural Networks playlist](https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_ZCJB-3pi) ch. 1–4.\n- [ ] **1A** reading: [Google MLCC — Embeddings module](https://developers.google.com/machine-learning/crash-course/embeddings).\n- [ ] **1B** 🔴 Cosine similarity + L2 normalization: [HF CLIP page](https://huggingface.co/learn/computer-vision-course/en/unit4/multimodal-models/clip-and-relatives/clip) + [OpenAI CLIP repo](https://github.com/openai/CLIP) (\"cosine similarities × 100\"). **Goal:** why normalize before comparing; what \"close in embedding space\" means numerically.\n- [ ] **1C** 🟡 [Karpathy — micrograd](https://karpathy.ai/zero-to-hero.html) (~2h25m) so `backward()`/`zero_grad()` stop being magic; then the official [PyTorch training tutorial](https://docs.pytorch.org/tutorials/beginner/introyt/trainingyt.html) and [Raschka — PyTorch in One Hour](https://sebastianraschka.com/teaching/pytorch-1h/).\n\n## Phase 2 — Transformers & vision encoders (~16–20 h) 🔴\n\nThe V-JEPA encoder and Llama predictor are both Transformers — non-negotiable.\n\n- [ ] **2A** [3Blue1Brown — Attention, visually explained](https://www.youtube.com/watch?v=eMlx5fFNoYc) (~26 min): Q/K/V, softmax attention, the −∞ masking trick.\n- [ ] **2A** [Karpathy — \"Let's build GPT\"](https://www.youtube.com/watch?v=kCc8FmEb1nY) (1h56m): implement self-attention, multi-head, positional encoding, causal masking yourself.\n- [ ] **2A** rigor (skip if the above feel comfortable): [CS224n 2023 Lecture 8](https://www.youtube.com/watch?v=LWMzyfvuehA) (~1h15m) · [course page](https://web.stanford.edu/class/cs224n/) · [playlist](https://www.youtube.com/playlist?list=PLrLxpnf4DCA86z2XBgBQq2s6sKUTD5Bqm). Reading: Vaswani et al. + [Illustrated Transformer](https://jalammar.github.io/illustrated-transformer/).\n- [ ] **2B** 🔴 Causal vs bidirectional masks — covered in both videos above. **Project note:** V-JEPA's *encoder* is bidirectional over video patches; the Llama-initialized *predictor* is causal — that difference explains the architecture.\n- [ ] **2C** 🔴 ViT: [Dosovitskiy et al., \"An Image is Worth 16×16 Words\"](https://openreview.net/forum?id=YicbFdNTTy) — the patch idea V-JEPA extends to 3D tubelets. Companions: [HF CV course](https://huggingface.co/learn/computer-vision-course) ViT unit, [CS231n 2024 attention slides](https://cs231n.stanford.edu/slides/2024/lecture_8.pdf).\n- [ ] **2D** 🔴 [Yannic Kilcher — V-JEPA explained](https://www.youtube.com/watch?v=7UkJPwz_N_0) (~50 min): encoder, predictor, masking, why feature-space beats pixel prediction (doubles as the bridge to Phase 3).\n- [ ] **2D** reading: [V-JEPA 2 paper](https://arxiv.org/abs/2506.09985) (Assran/Bardes et al., Meta). Retain: 1.2B params, ViT-g encoder, >1M hours video (VideoMix22M); 77.3 top-1 on SSv2, 39.7 R@5 on Epic-Kitchens-100; mask-denoising in representation space, L1 loss, stop-gradient + EMA target encoder against collapse. Hands-on: [LearnOpenCV V-JEPA 2 guide](https://learnopencv.com/v-jepa-2-meta-world-model-robotics-guide/).\n- [ ] **2D** Llama background (light): decoder-transformer mechanics from Karpathy's video suffice; SONAR's encoder builds on Llama-3.2-1B.\n\n## Phase 3 — JEPA: the core idea (~12–16 h) 🔴 MOST CRITICAL\n\n- [ ] **3A** Yannic Kilcher — \"JEPA: A Path Towards Autonomous Machine Intelligence\" (~59 min; search the channel by title; [paper](https://openreview.net/forum?id=BZ5a1r-kVsf)): energy-based models, latents, collapse, contrastive vs regularized, JEPA/H-JEPA.\n- [ ] **3A** reading: LeCun's position paper + [Rohit Bandaru — JEPA Deep Dive](https://rohitbandaru.github.io/blog/JEPA-Deep-Dive/) (JEPA, I-JEPA, V-JEPA in one place).\n- [ ] **3B** 🔴 I-JEPA/V-JEPA papers + [code](https://github.com/facebookresearch/jepa); re-use the Kilcher V-JEPA video's pixel-vs-feature contrast.\n- [ ] **3C** 🔴 The central thesis — read VL-JEPA §1–2 *now* with the JEPA background; gentle companion: [Anshul Bakode — \"Thinks in Embeddings, Not Words\"](https://medium.com/@anshulbakode/vl-jepa-the-vision-language-model-that-thinks-in-embeddings-not-words-ab642801cb01).\n- [ ] **3D** 🔴 Collapse + anti-collapse: [VICReg paper](https://arxiv.org/abs/2105.04906) (variance/invariance/covariance; why pull-only objectives collapse) + [AssemblyAI plain-language review](https://www.assemblyai.com/blog/review-vicreg-variance-invariance-covariance-regularization-for-self-supervised-learning). **Note:** VL-JEPA uses InfoNCE (contrastive anti-collapse); the paper flags VICReg/SIGReg as unevaluated alternatives — know both families.\n\n## Phase 4 — Contrastive learning, InfoNCE & CLIP (~12–16 h) 🔴\n\n- [ ] **4A** Yannic Kilcher's SimCLR explainer (search channel; paper: Chen et al. 2020) — positives/negatives, why we push apart. Companion: [InfoNCE explained (Medium)](https://medium.com/@mlshark/infonce-explained-in-details-and-implementations-902f28199ce6).\n- [ ] **4B** 🔴 InfoNCE math: van den Oord et al. (CPC paper); formula + mutual-information bound summarized at [EmergentMind](https://www.emergentmind.com/topics/infonce). **Goal:** read VL-JEPA's loss and recognize temperature τ, one positive, many negatives, cosine in the exponent.\n- [ ] **4C** 🔴 CLIP: [Aleksa Gordić — CLIP paper explained](https://www.youtube.com/watch?v=fQyHEXZB-nM) + [OpenAI CLIP page](https://openai.com/index/clip/) + Radford et al. Dual encoder, symmetric InfoNCE, 400M pairs. VL-JEPA is benchmarked against CLIP/SigLIP2/Perception Encoder on 8+8 classification/retrieval datasets.\n- [ ] **4D** 🟡 Wang & Isola, alignment & uniformity on the hypersphere — why L2-normalization and the sphere matter.\n\n## Phase 5 — Text embeddings & decoding back to text (~6–9 h) 🟡 (SONAR 🔴)\n\n- [ ] **5A** [Intuitive Sentence-BERT (TDS)](https://towardsdatascience.com/an-intuitive-explanation-of-sentence-bert-1984d144a868/) + [sbert.net](https://sbert.net/) (siamese nets, mean pooling, cosine). Ref: Reimers & Gurevych 2019.\n- [ ] **5B** 🔴 SONAR — the project's decoding step: [paper](https://arxiv.org/abs/2308.11466) + [GitHub](https://github.com/facebookresearch/SONAR). Retain: single 1024-d space, 200 languages, NLLB-initialized encoder/decoder, mean-pooled fixed-length vector, MSE alignment, decoder inverts the bottleneck via beam search (`TextToEmbeddingModelPipeline` / `EmbeddingToTextModelPipeline`). Companion: [Bryan Teo — SONAR Explained](https://medium.com/@bteo/sonar-explained-a9c99f1376e8).\n- [ ] **5C** 🟡 Embedding-to-text inversion generally = seq2seq attending to one bottleneck vector (covered by SONAR).\n- [ ] **5D** 🟢 EmbeddingGemma model card — know it exists as an alternative backbone.\n\n## Phase 6 — Clustering & selective decoding (~12–16 h) 🔴 MOST CRITICAL (the original research)\n\nWhere LiveJEPA decides *when* to emit a caption.\n\n- [ ] **6A** [StatQuest — Hierarchical clustering](https://www.youtube.com/watch?v=7xHsRkOdVwo) (~11 min) + [k-means](https://www.youtube.com/watch?v=4b5d3muPQmA) (~9 min, contrast) + [scikit-learn clustering guide](https://scikit-learn.org/stable/modules/clustering.html).\n- [ ] **6B** 🔴 Ward linkage / variance minimization: [Ward's method (Wikipedia)](https://en.wikipedia.org/wiki/Ward%27s_method) + [merge-cost walkthrough](https://jbhender.github.io/Stats506/F18/GP/Group10.html): Δ(A,B) = (n_A n_B)/(n_A+n_B)·‖m_A − m_B‖² — merge the pair that grows within-cluster variance least; directly the \"group consecutive embeddings by minimizing variance\" idea.\n- [ ] **6C** 🔴 Temporal/connectivity-constrained clustering: [AgglomerativeClustering docs](https://scikit-learn.org/stable/modules/generated/sklearn.cluster.AgglomerativeClustering.html) + [with/without structure example](https://scikit-learn.org/stable/auto_examples/cluster/plot_agglomerative_clustering.html) — adjacency-in-time constraint = segmenting a streaming embedding sequence.\n- [ ] **6D** 🔴 Change-point detection: [Fraunhofer IESE intro](https://www.iese.fraunhofer.de/blog/change-point-detection/) + [online vs offline CPD](https://techrando.com/2019/08/14/a-brief-introduction-to-change-point-detection-using-python/) — \"decode only when a new event occurs\" is *online* CPD on the embedding stream. Tool: `ruptures`.\n- [ ] **6E** 🟡 Moving averages / smoothing (pandas `.rolling().mean()`): denoise the inter-embedding distance signal before thresholding.\n- [ ] **6F** 🔴 **Tie it together in a notebook:** smooth the distance signal → detect a change-point/variance spike (\"new event\") → one decode per segment. Then **re-read VL-JEPA §4.5** and confirm the paper's exact trigger rule against your implementation *(the ~2.85× figure and event-triggered framing are confirmed; the precise formula must be verified in the PDF)*.\n\n## Phase 7 — Video understanding, streaming & evaluation (~10–14 h) 🔴/🟡\n\n- [ ] **7A** 🟡 [Video captioning survey](https://arxiv.org/pdf/2204.05976) — task framing + BLEU/METEOR/ROUGE-L/CIDEr suite.\n- [ ] **7B** 🔴 [VideoLLM-online (CVPR 2024)](https://arxiv.org/abs/2406.11816) — LIVE framework, Streaming EOS prediction (\"when to respond\"), 5–15 FPS on 3090/A100. The closest published analog: its EOS-trigger vs VL-JEPA's embedding-change trigger — know the contrast cold; it's a thesis-defense question waiting to happen.\n- [ ] **7C** 🟢 VQA basics: skim GQA / VQA-v2 dataset pages (VL-JEPA evaluates on GQA, TallyQA, POPE, POPEv2).\n- [ ] **7D** 🟡 Text-to-video retrieval + Recall@K.\n- [ ] **7E** 🔴 CIDEr (Vedantam et al. 2015): average cosine similarity of TF-IDF-weighted n-grams — distinctive consensus content scores high; range ~0–5 (or ×100). Plus BLEU (n-gram precision + brevity), METEOR (unigram P/R + synonyms), ROUGE-L (LCS recall), SPICE (scene graphs). Comparison: [Labellerr guide](https://www.labellerr.com/blog/image-captioning-evaluation-and-fine-tuning/).\n\n## Phase 8 — Tooling (interleave, ~5–7 h) 🟡\n\n- [ ] [HF course welcome video](https://www.youtube.com/watch?v=00GKzGyWFEs) + [HF LLM course ch. 1–4](https://huggingface.co/learn/llm-course/en/chapter1/1) (`AutoModel`, pipelines, fine-tuning; ~6–8 h). CLIP and SONAR both load via this ecosystem.\n- [ ] Paper-reading skill: Andrew Ng's advice + Keshav's three-pass method; Kilcher's walkthroughs model it (abstract → figures → method → experiments).\n\n## Capstone\n\n- [ ] Re-read the entire VL-JEPA paper end-to-end. You should now understand every component — anything still foggy maps back to a phase above; that's your revision list.\n", "tasks": 42}, {"id": "resources", "file": "resources.md", "title": "Resources", "md": "# VL-JEPA Quick Reference\n\nCompact index of the curriculum's sources ([full context in roadmap.md](roadmap.md)).\n\n## Primary papers (the spine)\n- **[VL-JEPA](https://arxiv.org/abs/2512.10942)** — the paper the thesis builds on (Chen et al., Meta FAIR, ICLR 2026)\n- **[V-JEPA 2](https://arxiv.org/abs/2506.09985)** — the video encoder\n- **[I-JEPA / V-JEPA code](https://github.com/facebookresearch/jepa)** — reference implementation\n- **[VICReg](https://arxiv.org/abs/2105.04906)** — anti-collapse regularization family\n- **[SONAR](https://arxiv.org/abs/2308.11466)** + [GitHub](https://github.com/facebookresearch/SONAR) — invertible text embedding space\n- **[ViT](https://openreview.net/forum?id=YicbFdNTTy)** — patch tokenization\n- **[VideoLLM-online](https://arxiv.org/abs/2406.11816)** — closest streaming-captioning analog\n- CLIP (Radford et al.) · SimCLR (Chen et al.) · CPC/InfoNCE (van den Oord et al.) · CIDEr (Vedantam et al.) · [LeCun's JEPA position paper](https://openreview.net/forum?id=BZ5a1r-kVsf)\n\n## Video channels (by what they're best at)\n- **[3Blue1Brown](https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_ZCJB-3pi)** — intuition: embeddings, attention\n- **[Karpathy — Zero to Hero](https://karpathy.ai/zero-to-hero.html)** — build it in code: micrograd, GPT\n- **Yannic Kilcher** — paper walkthroughs: [V-JEPA](https://www.youtube.com/watch?v=7UkJPwz_N_0), JEPA position paper, SimCLR\n- **[StatQuest](https://www.youtube.com/@statquest)** — clustering: [hierarchical](https://www.youtube.com/watch?v=7xHsRkOdVwo), [k-means](https://www.youtube.com/watch?v=4b5d3muPQmA)\n- **[Stanford CS224n](https://web.stanford.edu/class/cs224n/)** — rigor: [2023 Lecture 8, transformers](https://www.youtube.com/watch?v=LWMzyfvuehA)\n- **[The AI Epiphany](https://www.youtube.com/watch?v=fQyHEXZB-nM)** — CLIP explained\n\n## Explainers & guides\n- [Rohit Bandaru — JEPA Deep Dive](https://rohitbandaru.github.io/blog/JEPA- const state = {
  role: localStorage.getItem("rp:role") || DATA.roles[0].slug,
  doc: localStorage.getItem("rp:doc") || DATA.roles[0].docs[0].id,
};

function role() { return DATA.roles.find(r => r.slug === state.role) || DATA.roles[0]; }
function doc() { return role().docs.find(d => d.id === state.doc) || role().docs[0]; }
function ckKey(i) { return `rp:ck:${state.role}:${state.doc}:${i}`; }

function setState(roleSlug, docId) {
  state.role = roleSlug;
  const r = role();
  state.doc = r.docs.some(d => d.id === docId) ? docId : r.docs[0].id;
  localStorage.setItem("rp:role", state.role);
  localStorage.setItem("rp:doc", state.doc);
  render();
}

function renderTabs() {
  const el = document.getElementById("roleTabs");
  el.innerHTML = "";
  for (const r of DATA.roles) {
    const b = document.createElement("button");
    b.className = "tab" + (r.slug === state.role ? " active" : "");
    b.textContent = r.name;
    b.onclick = () => setState(r.slug, state.doc);
    el.appendChild(b);
  }
}

function renderNav() {
  const el = document.getElementById("docNav");
  el.innerHTML = "";
  for (const d of role().docs) {
    const b = document.createElement("button");
    b.className = "doc-btn" + (d.id === state.doc ? " active" : "");
    b.textContent = d.title;
    b.onclick = () => setState(state.role, d.id);
    el.appendChild(b);
  }
}

function updateProgress() {
  const rm = role().docs.find(d => d.id === "roadmap");
  const total = rm ? rm.tasks : 0;
  let done = 0;
  for (let i = 0; i < total; i++) {
    if (localStorage.getItem(`rp:ck:${state.role}:roadmap:${i}`) === "1") done++;
  }
  const pct = total ? Math.round(100 * done / total) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent =
    total ? `Roadmap progress: ${done}/${total} (${pct}%)` : "";
}

function fixLinks(container) {
  for (const a of container.querySelectorAll("a[href]")) {
    const href = a.getAttribute("href");
    if (/^https?:/i.test(href)) {
      a.target = "_blank"; a.rel = "noopener";
    } else if (href.endsWith(".md") || href.includes(".md#")) {
      const [path] = href.split("#");
      let targetRole = state.role;
      let file = path;
      const m = path.match(/^\.\.\/([^/]+)\/(.+)$/);
      if (m) { targetRole = m[1]; file = m[2]; }
      const targetDoc = file.replace(/\.md$/, "");
      a.href = "javascript:void(0)";
      a.onclick = () => setState(targetRole, targetDoc);
    }
  }
}

function enhanceCheckboxes(container) {
  const boxes = container.querySelectorAll('li input[type="checkbox"]');
  boxes.forEach((box, i) => {
    box.disabled = false;
    const li = box.closest("li");
    li.classList.add("task");
    const span = document.createElement("span");
    span.className = "task-text";
    while (box.nextSibling) span.appendChild(box.nextSibling);
    li.insertBefore(span, box.nextSibling);
    box.checked = localStorage.getItem(ckKey(i)) === "1";
    li.classList.toggle("done", box.checked);
    box.onchange = () => {
      localStorage.setItem(ckKey(i), box.checked ? "1" : "0");
      li.classList.toggle("done", box.checked);
      updateProgress();
    };
  });
  return boxes.length;
}

function accordionize(container) {
  // Wrap each h3 section of the Q&A bank in a collapsible <details>
  const main = container;
  const headers = [...main.querySelectorAll("h3")];
  for (const h of headers) {
    const details = document.createElement("details");
    details.className = "qa";
    const summary = document.createElement("summary");
    summary.textContent = h.textContent;
    details.appendChild(summary);
    const chunk = [];
    let n = h.nextSibling;
    while (n && !(n.nodeType === 1 && /^H[123]$/.test(n.tagName))) {
      chunk.push(n); n = n.nextSibling;
    }
    h.replaceWith(details);
    chunk.forEach(c => details.appendChild(c));
  }
}

function buildToc(container) {
  const toc = document.getElementById("toc");
  toc.innerHTML = "";
  container.querySelectorAll("h2").forEach((h, i) => {
    h.id = "sec-" + i;
    const a = document.createElement("a");
    a.href = "#sec-" + i;
    a.textContent = h.textContent;
    a.title = h.textContent;
    toc.appendChild(a);
  });
}

function render() {
  renderTabs();
  renderNav();
  const el = document.getElementById("content");
  el.innerHTML = marked.parse(doc().md);
  if (state.doc === "qa-bank") {
    const controls = document.createElement("div");
    controls.className = "controls";
    const open = document.createElement("button");
    open.textContent = "Expand all answers";
    const close = document.createElement("button");
    close.textContent = "Collapse all";
    controls.append(open, close);
    accordionize(el);
    el.querySelector("h1").after(controls);
    open.onclick = () => el.querySelectorAll("details.qa").forEach(d => d.open = true);
    close.onclick = () => el.querySelectorAll("details.qa").forEach(d => d.open = false);
    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = "Try answering out loud before opening each answer.";
    controls.after(hint);
  }
  fixLinks(el);
  const n = enhanceCheckboxes(el);
  if (n) {
    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = "☑ Checkboxes are clickable — progress is saved in this browser.";
    el.querySelector("h1").after(hint);
  }
  buildToc(el);
  updateProgress();
  window.scrollTo(0, 0);
}

const FS_MIN = 15, FS_MAX = 21;
let fontSize = parseInt(localStorage.getItem("rp:fs") || "17", 10);
function applyFontSize() {
  fontSize = Math.min(FS_MAX, Math.max(FS_MIN, fontSize));
  document.documentElement.style.setProperty("--content-size", fontSize + "px");
  localStorage.setItem("rp:fs", String(fontSize));
}
document.getElementById("fsMinus").onclick = () => { fontSize--; applyFontSize(); };
document.getElementById("fsPlus").onclick = () => { fontSize++; applyFontSize(); };
applyFontSize();

function effectiveTheme() {
  const set = document.documentElement.getAttribute("data-theme");
  if (set) return set;
  return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function applyTheme(t) {
  if (t) document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("rp:theme", t || "");
}
const savedTheme = localStorage.getItem("rp:theme");
if (savedTheme) applyTheme(savedTheme);
document.getElementById("themeToggle").onclick = () =>
  applyTheme(effectiveTheme() === "dark" ? "light" : "dark");

marked.use({ gfm: true, breaks: false });
render();
</script>
