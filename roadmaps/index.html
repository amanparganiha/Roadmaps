labels available?\n2. **Data & labeling plan**: collection at the actual site, labeling workflow (SAM/CLIP to bootstrap), class balance, the eval set must match deployment conditions.\n3. **Baseline first**: classical CV or an off-the-shelf pretrained detector before custom training — say it explicitly.\n4. **Model & training**: detector choice with trade-offs (small object? speed?), augmentation matched to real variation.\n5. **Serving**: edge vs server math (bandwidth of streaming video vs on-device inference), quantized model, tracker to smooth per-frame noise, fallback path.\n6. **Monitoring & drift**: confidence-distribution monitoring, periodic sampled human review, retraining loop when cameras/sites/products change.\n7. **Iterate**: ship on one line/store, measure, expand.\n\n**Instant-fail behaviors:** jumping to \"train a YOLO\" before asking about error costs and camera control; no labeling plan; ignoring lighting/domain shift; quoting FPS without hardware context.\n\n### Behavioral\nSame 6 STAR stories as [AI/ML prep](../ai-ml-engineer/interview-prep.md); add one CV-specific: a time a model failed *in the field* (or your project's failure-gallery analysis) and how you diagnosed it — data problem vs model problem.\n\n---\n\n## Week-6 drill schedule\n\n| Day | Drill (~3–4 hrs) |\n|---|---|\n| 1 | IoU + NMS from scratch, timed 40' + 8 depth questions out loud |\n| 2 | Timed system design #1 (parking occupancy) + convolution from scratch |\n| 3 | [Pramp](https://www.pramp.com/) general-coding mock + 8 more depth questions |\n| 4 | Project deep-dive rehearsal (detector CV-3), friend grilling + OpenCV PR work |\n| 5 | Timed system design #2 (medical segmentation) + mAP walk-through out loud |\n| 6 | **Full self-run loop** (coding 60' → depth 45' → design 60' → project 30' → behavioral 30') |\n| 7 | Patch weakest round; polish portfolio; applications |\n\n## Self-scoring rubric (per round, 1–4)\n\n- **1** — Couldn't produce working IoU/NMS or froze on \"why convolution\"\n- **2** — Correct but shallow: no trade-offs, no eval story, quoted metrics without context\n- **3** — Structured: clarified constraints, justified choices, connected metrics to deployment reality\n- **4** — Hire signal: raised domain shift, labeling strategy, and monitoring unprompted; adjusted under challenge\n\n---\n\n## Free question sources worth drilling from\n\n- [Devinterview-io CV questions (GitHub)](https://github.com/Devinterview-io/computer-vision-interview-questions) — large free bank for breadth sweeps\n- [andrewekhalel/MLQuestions (GitHub)](https://github.com/andrewekhalel/MLQuestions) — classic ML/CV technical questions collection\n- [Interview Query CV questions](https://www.interviewquery.com/p/computer-vision-interview-questions) — free article tier with worked discussion\n", "tasks": 0}, {"id": "qa-bank", "file": "qa-bank.md", "title": "Q&A Bank", "md": "# Computer Vision Q&A Bank\n\nDetailed questions **with answers**. ⭐ = near-universal. Shared fundamentals (backprop, BatchNorm, optimizers, bias/variance) live in the [AI/ML qa-bank](../ai-ml-engineer/qa-bank.md) — drill both.\n\n---\n\n## Part 1 — Fundamentals\n\n### ⭐ Q1. Why are convolutions the right tool for images?\n**Answer:** Three properties of images map to three properties of convolution: (1) **locality** — nearby pixels are related, and a small kernel looks at local neighborhoods; (2) **translation equivariance** — a cat in the corner is still a cat in the center, and sliding the same kernel everywhere means features are detected regardless of position; (3) **parameter sharing** — one 3×3 kernel (9 weights) scans the whole image instead of a fully-connected layer needing millions of weights per output. Result: far fewer parameters, better generalization, and a built-in prior that matches image structure. Follow-up worth volunteering: ViTs relax these priors and substitute scale — with enough data, learned attention can beat hand-built inductive bias.\n\n### ⭐ Q2. Explain receptive field and why it matters.\n**Answer:** The region of the input image that influences one output neuron. A single 3×3 conv sees 3×3 pixels; stacking layers grows it (two 3×3 = 5×5 effective), and stride/pooling/dilation grow it faster. It matters because a network can't reason about objects bigger than its receptive field — a detector whose deepest features see 100×100 pixels will miss a 400-pixel object's global structure. Practical answers interviewers want: detect small objects on high-res feature maps (early layers / FPN), large objects on deep coarse maps; dilated convolutions grow the field without losing resolution (segmentation loves them).\n\n### Q3. What does pooling do, and what's the trade-off vs strided convolutions?\n**Answer:** Both downsample: reduce spatial size, grow receptive field, cut compute, add small translation invariance. Max-pooling keeps the strongest activation (cheap, no parameters, biased toward \"is the feature present\"); strided conv learns *how* to downsample (more expressive, costs parameters). Modern nets mostly use strided convs; the deeper interview point is what's lost either way — precise localization — which is why segmentation architectures add skip connections (U-Net) to recover fine detail.\n\n### ⭐ Q4. Which data augmentations are safe, and when do they break?\n**Answer:** Augmentation should simulate variation the model will actually meet, without changing the label. Safe defaults for natural photos: crops, horizontal flip, color jitter, slight rotation/scale, blur/noise. Breakage cases interviewers love: **horizontal flip on text/digits** (mirror-image characters change meaning), **flips in medical imaging** where laterality matters (situs of organs), **heavy color jitter when color *is* the signal** (ripeness, skin lesions, wire colors), rotation for orientation-dependent tasks (satellite \"north-up\" conventions). For detection, geometric transforms must also transform the boxes. Best practice: build augmentation from the *deployment failure gallery*, not a generic recipe.\n\n### Q5. Transfer learning: what do you freeze and when?\n**Answer:** Rule of thumb by data size and domain gap: (1) tiny dataset, similar domain → freeze the backbone, train only the head; (2) medium data → unfreeze the last block(s), lower LR on pretrained layers (discriminative LRs); (3) large data or big domain gap (natural photos → X-ray/thermal) → fine-tune everything, possibly from self-supervised weights; training from scratch is justified only with huge data or exotic inputs (e.g., 7-channel satellite). Always mention: early conv layers learn generic edges/textures that transfer almost universally — that's why freezing them is cheap.\n\n---\n\n## Part 2 — Detection & segmentation\n\n### ⭐ Q6. Explain IoU, and why detection needs it.\n**Answer:** Intersection-over-Union = overlap area / union area between predicted and ground-truth boxes — a scale-invariant measure of localization quality in [0,1]. Detection needs it because \"correct\" isn't binary: a prediction is counted a true positive only if IoU with a ground-truth box exceeds a threshold (0.5 classically). It's also the matching currency inside NMS and inside mAP computation. Nuance worth adding: IoU is harsh on small objects (a 2-pixel shift tanks IoU for a 10-pixel box) — one reason small-object detection is hard to score well.\n\n### ⭐ Q7. Explain NMS — why it exists and its failure modes.\n**Answer:** Detectors emit many overlapping boxes for the same object (dense heads score every anchor/location). NMS cleans up: sort by confidence, keep the top box, suppress all boxes with IoU above a threshold against it, repeat. Failure modes: **crowded scenes** — two genuinely overlapping objects (people in a crowd) get one suppressed; threshold tension (too low → misses in crowds, too high → duplicates survive). Fixes to name: Soft-NMS (decay scores instead of deleting), class-aware NMS, or end-to-end architectures (DETR-family) that learn deduplication and skip NMS entirely. Code in Part 3.\n\n### ⭐ Q8. Walk me through how mAP is computed.\n**Answer:** Per class: (1) sort all predictions across the dataset by confidence; (2) walking down that list, mark each prediction TP if it matches an unmatched ground-truth box with IoU ≥ threshold, else FP; (3) at each step compute cumulative precision and recall → a PR curve; (4) AP = area under that curve; (5) mAP = mean over classes. \"mAP@[.5:.95]\" (COCO) averages this over IoU thresholds 0.5–0.95, rewarding tight localization. When it misleads: dominated by common classes unless per-class is reported; blind to confidence calibration; a model can have great mAP but a terrible operating point for *your* error costs — production picks one threshold from the PR curve, mAP averages them all.\n\n### Q9. One-stage vs two-stage detectors; anchor-based vs anchor-free.\n**Answer:** **Two-stage** (Faster R-CNN family): propose regions first, then classify/refine each — historically more accurate, slower. **One-stage** (YOLO/SSD/RetinaNet): predict boxes densely in one pass — faster, and since focal loss fixed the extreme background-imbalance problem, competitive in accuracy; the practical default (YOLO-family) for real-time work. **Anchor-based**: predict offsets from preset box shapes (needs anchor tuning); **anchor-free** (FCOS/CenterNet, modern YOLOs): predict centers/distances directly — simpler, fewer hyperparameters. Honest practical answer: \"for most industrial jobs I start with a pretrained modern YOLO and spend my time on data and evaluation, not architecture.\"\n\n### Q10. Focal loss — what problem does it solve?\n**Answer:** Dense one-stage detectors evaluate ~100k locations per image, nearly all easy background. Standard cross-entropy lets that ocean of easy negatives dominate the gradient, drowning the rare hard examples. Focal loss multiplies CE by (1−p)^γ, down-weighting examples the model already gets right, so training focuses on hard cases. It's also the go-to answer for extreme class imbalance in classification generally.\n\n### Q11. Semantic vs instance vs panoptic segmentation; and why Dice/IoU loss?\n**Answer:** **Semantic**: label every pixel by class (\"road\", \"person\") — instances merge. **Instance**: separate masks per object instance (person-1 vs person-2). **Panoptic**: both — every pixel gets class + instance id. Losses: pixel-wise cross-entropy struggles when the object is 1% of pixels (predicting \"all background\" is 99% accurate); **Dice/IoU losses** optimize overlap directly and are robust to that imbalance — standard in medical imaging. U-Net's skip connections (encoder detail → decoder) are why it's still the medical default.\n\n### Q12. How would you handle small-object detection?\n**Answer:** Multi-pronged: higher input resolution (the biggest single lever, costs latency); FPN-style multi-scale features so small objects are detected on fine maps; tiling/SAHI (slice the image, detect per tile, merge with NMS) for huge images like satellite/PCB; augmentation that pastes small objects; and honest evaluation — report AP-small separately. Also question the camera first: moving it closer or upping resolution is often cheaper than any model fix — a very FDE-flavored answer that CV interviewers also reward.\n\n---\n\n## Part 3 — From-scratch code (the CV coding round)\n\n### ⭐ Q13. IoU between two boxes.\n```python\ndef iou(a, b):\n    # boxes as (x1, y1, x2, y2)\n    ix1, iy1 = max(a[0], b[0]), max(a[1], b[1])\n    ix2, iy2 = min(a[2], b[2]), min(a[3], b[3])\n    iw, ih = max(0.0, ix2 - ix1), max(0.0, iy2 - iy1)   # clamp: no overlap → 0\n    inter = iw * ih\n    area_a = (a[2] - a[0]) * (a[3] - a[1])\n    area_b = (b[2] - b[0]) * (b[3] - b[1])\n    return inter / (area_a + area_b - inter + 1e-9)\n```\n**Narrate:** the clamp to 0 for disjoint boxes is where most candidates bug out; the epsilon guards degenerate zero-area boxes. Offer the vectorized N×M version with broadcasting — `np.maximum(a[:, None, :2], b[None, :, :2])` — before being asked.\n\n### ⭐ Q14. NMS.\n```python\ndef nms(boxes, scores, iou_thresh=0.5):\n    order = sorted(range(len(boxes)), key=lambda i: scores[i], reverse=True)\n    keep = []\n    while order:\n        best = order.pop(0)\n        keep.append(best)\n        order = [i for i in order if iou(boxes[best], boxes[i]) \u003c iou_thresh]\n    return keep\n```\n**Narrate:** O(n²) worst case — fine for hundreds of boxes, and real systems pre-filter by a confidence threshold first; per-class NMS runs this independently per class. Mention Soft-NMS as the crowded-scene fix (decay scores by IoU instead of deleting).\n\n### ⭐ Q15. 2D convolution in NumPy.\n```python\nimport numpy as np\n\ndef conv2d(img, kernel, stride=1, pad=0):\n    if pad:\n        img = np.pad(img, pad)\n    kh, kw = kernel.shape\n    oh = (img.shape[0] - kh) // stride + 1\n    ow = (img.shape[1] - kw) // stride + 1\n    out = np.zeros((oh, ow))\n    for y in range(oh):\n        for x in range(ow):\n            patch = img[y*stride:y*stride+kh, x*stride:x*stride+kw]\n            out[y, x] = np.sum(patch * kernel)\n    return out\n```\n**Narrate:** state the output-size formula out loud — (N − K + 2P)/S + 1 — interviewers ask it constantly. Note this is cross-correlation (true convolution flips the kernel; deep learning \"conv\" never bothers). Know that real implementations use im2col + matrix multiply or FFT for speed.\n\n### Q16. Bilinear interpolation (image resize).\n**Answer sketch:** for each output pixel, map back to fractional source coordinates (x, y); take the 4 surrounding pixels; blend horizontally by the fractional x, then vertically by fractional y (weights sum to 1). Edge handling: clamp coordinates to valid range. Say why it matters: it's inside every resize, RoI-Align, and spatial transformer — and RoI-*Align* vs RoI-Pool (no quantization, exact fractional sampling) is a classic follow-up.\n\n---\n\n## Part 4 — Modern vision\n\n### ⭐ Q17. ViT vs CNN — when does each win?\n**Answer:** ViT splits the image into patches, embeds them as tokens, and runs a standard transformer — no convolutional priors, so every patch can attend to every other from layer 1 (global context immediately, vs CNNs building it slowly). Trade-off: without locality/equivariance priors, ViTs need much more data or strong pretraining to match CNNs; with large-scale pretraining they scale better and dominate foundation-model land. Practical guidance: small dataset + from-scratch → CNN; fine-tuning big pretrained checkpoints or multimodal work → ViT-based. Hybrid answer for real jobs: \"I use whatever pretrained backbone is best-supported; at industrial data scales the data pipeline matters more than CNN-vs-ViT.\"\n\n### ⭐ Q18. How does CLIP enable zero-shot classification?\n**Answer:** CLIP trains an image encoder and a text encoder contrastively on ~400M image-caption pairs: matching pairs pulled together in a shared embedding space, mismatched pushed apart. Zero-shot classification: embed the image, embed text prompts (\"a photo of a defective bottle\", \"a photo of a normal bottle\"), pick the closest — no training on your classes at all. Practical uses beyond the party trick: bootstrap labeling (pre-sort unlabeled data), semantic image search, open-vocabulary detection (find objects by description). Limits to name: fine-grained distinctions and counting are weak; prompt wording moves accuracy; domain gap (CLIP saw web photos, not your X-rays).\n\n### Q19. What is SAM and where does it fit a real pipeline?\n**Answer:** Segment Anything — a promptable segmentation foundation model: give it a point, box, or (with variants) text, and it returns a high-quality mask for that object, zero-shot. Where it actually fits: **labeling acceleration** (click → mask instead of hand-drawn polygons — 10× faster annotation), mask generation downstream of a detector (detector finds boxes, SAM refines to masks), and interactive tools. Limits: it segments *things* but doesn't know *what* they are (pair with a classifier/CLIP), and it's heavy for real-time edge use (distilled variants exist).\n\n### Q20. Your model worked in the lab and fails on the factory camera. Debug it.\n**Answer:** Domain shift, worked as a funnel: (1) **look at the failing images first** — 15 minutes of looking beats a week of guessing (different lighting? focus? angle? new product variant?); (2) compare input distributions (brightness/contrast/blur stats, embedding-space distance between lab and field data); (3) check the boring layer — camera auto-exposure/white-balance drift, compression artifacts from the video pipeline, resolution mismatch in preprocessing (a resize-interpolation mismatch between training and serving is a real classic); (4) fix cheapest-first: control the environment (fix exposure, add lighting — hardware beats retraining), match augmentation to observed variation, fine-tune on a few hundred field images; (5) prevent recurrence: an eval set *from the deployment site*, confidence monitoring, and a periodic sampled human review loop.\n\n---\n\n### Q21. Explain self-supervised learning in vision — contrastive vs masked-reconstruction vs JEPA.\n**Answer:** SSL learns representations from unlabeled images/video by inventing a pretext task, so you can pretrain on cheap unlabeled data and fine-tune on small labeled sets. Three families: (1) **Contrastive/distillation** (SimCLR, DINO): pull augmented views of the same image together in embedding space — powerful, but depends heavily on augmentation choices (and negatives, for the contrastive variants). (2) **Masked reconstruction** (MAE): mask most patches, reconstruct them *in pixel space* — simple and scalable, but spends capacity modeling pixel-level detail (texture, noise) that downstream tasks rarely need. (3) **JEPA-family** (I-JEPA, V-JEPA for video): predict the *latent representations* of masked regions from visible context, not the pixels — the model learns semantic structure without wasting capacity on appearance detail, and without hand-crafted augmentations. For video, V-JEPA predicts representations of masked spatiotemporal blocks, learning motion and object dynamics from raw video. Why interviewers care: labels are the bottleneck of industrial CV, and SSL pretraining on in-domain unlabeled data (e.g., a factory's own camera feeds) is often the cheapest accuracy win available. If you've built on JEPA (thesis/research), lead with it in depth rounds — be ready to defend latent-prediction vs pixel-reconstruction and describe your eval protocol (linear probe vs fine-tune).\n\n---\n\n## Part 5 — System design: worked example\n\n### ⭐ Q22. \"Design defect detection for a bottling line — 30 bottles/second.\"\n\n**1. Clarify:** defect types (cap, fill level, label, cracks — different problems!); error costs — a missed defect reaching customers vs a good bottle rejected (usually misses are far costlier, so tune for recall with a manual-review lane for borderline); can we control camera and lighting? (yes on a factory line — huge advantage); reject mechanism latency budget (bottle must be flagged before the diverter — maybe 100ms end-to-end).\n\n**2. Exploit the controlled environment:** fixed camera, strobe/backlight, consistent background — this makes classical CV viable for some defects (fill level = edge detection against a backlight is more reliable than any CNN) and makes learned models dramatically easier. Saying \"fixed lighting first\" is a hire signal.\n\n**3. Baseline → model:** start hybrid — classical checks (fill level, cap presence via template/edges) + one compact detector/classifier for visual defects (label tears, cracks). Pretrained backbone fine-tuned on a few thousand labeled bottle crops; the *labeling plan* matters more: sample from the real line across shifts/products, SAM-assisted annotation, defect taxonomy agreed with QA staff.\n\n**4. Throughput math (do it out loud):** 30 bottles/sec → ~33ms per bottle. Quantized small model on an edge GPU/accelerator at the line (streaming video to cloud at this rate is a bandwidth and latency non-starter). Batch = trigger per bottle via a photoelectric sensor rather than free-running video — simpler and deterministic.\n\n**5. Serving & failure modes:** watchdog on camera health (a dirty lens fails *gradually* — monitor image sharpness/brightness stats); if the model or camera fails, fail *safe* per business rule (divert to manual inspection lane, never silently pass); log every rejected/borderline image.\n\n**6. Monitoring & iteration:** dashboard of reject rate per defect type per shift (a spike at shift change = lighting/procedure, not model); weekly sampled review of passes (miss estimation); retrain trigger on new products; the borderline-review lane continuously generates labeled data — the feedback flywheel.\n\n---\n\n## How to drill this bank\n\n- **Parts 1–2, 4:** 5 questions/day out loud as if teaching; re-derive, don't recite.\n- **Part 3:** type each from a blank file weekly until IoU/NMS/conv take \u003c15 minutes combined.\n- **Part 5:** whiteboard the bottling case yourself before reading; then do parking-occupancy and shelf-monitoring cold, 45' timed.\n- Breadth sweeps: [Devinterview-io CV bank](https://github.com/Devinterview-io/computer-vision-interview-questions) for volume once these are solid.\n", "tasks": 0}, {"id": "resources", "file": "resources.md", "title": "Resources", "md": "# Computer Vision Free Resources\n\nEverything the [roadmap](roadmap.md) links to, plus alternatives. All free. Shared fundamentals (Python, math, PyTorch basics) live in the [AI/ML resources](../ai-ml-engineer/resources.md).\n\n## OpenCV & classical CV\n- **[OpenCV Bootcamp](https://opencv.org/university/free-opencv-course/)** — the free *official* OpenCV course with certificate; image/video ops, filtering, detection, tracking, DNN module. *(~3 hrs video + notebooks)*\n- **[OpenCV Python tutorials (docs)](https://docs.opencv.org/4.x/d6/d00/tutorial_py_root.html)** — the reference for going deeper: contours, histograms, features, camera calibration. *(dip in as needed)*\n- Alt: [Great Learning free CV courses](https://www.mygreatlearning.com/computer-vision/free-courses) — beginner-friendly OpenCV walkthroughs with certificates.\n\n## CNNs & deep learning for vision\n- **[CS231n notes](https://cs231n.github.io/)** — the canonical course notes: convolution arithmetic, architectures, training. The single best free CV text. *(~10 hrs)*\n- **[CS231n lectures (YouTube)](https://www.youtube.com/playlist?list=PLoROMvodv4rMiGQp3WXShtMGgzqpfVfbU)** — video companion (older iterations are fine; fundamentals haven't moved).\n- **[OpenCV free PyTorch Bootcamp](https://opencv.org/university/free-pytorch-course/)** — official cert #2; PyTorch training on vision tasks. *(~5 hrs)*\n- **[PyTorch transfer learning tutorial](https://pytorch.org/tutorials/beginner/transfer_learning_tutorial.html)** — the fine-tuning workflow you'll use in every project. *(~2 hrs)*\n\n## Detection & segmentation\n- **[Ultralytics YOLO docs](https://docs.ultralytics.com/)** — train/validate/deploy custom detectors; the industry-default toolkit. *(~4 hrs to first custom model)*\n- **[Roboflow](https://roboflow.com/)** (free tier) — dataset labeling/augmentation/hosting; their [blog](https://blog.roboflow.com/) and [notebooks repo](https://github.com/roboflow/notebooks) are excellent free tutorials.\n- **[Label Studio](https://labelstud.io/)** — open-source annotation if you outgrow free tiers.\n- **[Segment Anything (SAM) — GitHub](https://github.com/facebookresearch/segment-anything)** — model + notebooks; use it for labeling acceleration and mask generation.\n\n## Modern vision (ViT, CLIP, VLMs)\n- **[Hugging Face Community Computer Vision Course](https://huggingface.co/learn/computer-vision-course/unit0/welcome/welcome)** — community-built, broad and current: ViT, multimodal, video, 3D, generative units. *(~10 hrs selectively)*\n- **[OpenCV Vision-Language Model Bootcamp](https://opencv.org/university/vision-language-model-bootcamp/)** — official cert #3: CLIP → VLM captioning/detection hands-on. *(~4 hrs)*\n\n## Deployment & production\n- **[ONNX Runtime docs](https://onnxruntime.ai/)** — export + quantize + benchmark; the portable-deployment default. *(~3 hrs)*\n- **[TensorRT overview](https://developer.nvidia.com/tensorrt)** — read conceptually for GPU-edge answers (setup optional).\n\n## Interview drilling\n- **[Devinterview-io CV interview questions](https://github.com/Devinterview-io/computer-vision-interview-questions)** — big free question bank for breadth sweeps.\n- **[andrewekhalel/MLQuestions](https://github.com/andrewekhalel/MLQuestions)** — classic ML/CV interview question collection.\n- **[Interview Query CV questions](https://www.interviewquery.com/p/computer-vision-interview-questions)** — worked discussion, free tier.\n- **[Pramp](https://www.pramp.com/)** — free peer mocks for the general coding round.\n\n## Open source (your OpenCV plan)\n- **[OpenCV contribution guide](https://github.com/opencv/opencv/wiki/How_to_contribute)** — read before your first PR; coding style + PR process.\n- **[OpenCV good first issues](https://github.com/opencv/opencv/issues?q=is%3Aissue+is%3Aopen+label%3A%22good+first+issue%22)** — realistic entries: docs/tutorials, Python binding tests, small bug fixes.\n- Expect slow reviews (large old C++ codebase); keep an MCP/LangChain contribution running in parallel per the [remote strategy](../remote-ai-career/resources.md).\n\n## Free certifications\n- **[OpenCV Bootcamp certificate](https://opencv.org/university/free-opencv-course/)**, **[PyTorch Bootcamp certificate](https://opencv.org/university/free-pytorch-course/)**, **[VLM Bootcamp certificate](https://opencv.org/university/vision-language-model-bootcamp/)** — all three are official OpenCV.org certs, genuinely free, and directly on-brand for a CV engineer résumé. Do these three; they're built into the roadmap weeks 1, 2, and 4.\n- [Kaggle Learn — Computer Vision](https://www.kaggle.com/learn) micro-cert as a quick extra.\n\n## Project fuel\n- **[Kaggle Datasets](https://www.kaggle.com/datasets)** + [Kaggle CV competitions](https://www.kaggle.com/competitions) — datasets and leaderboard practice.\n- **[Papers With Code — CV](https://paperswithcode.com/area/computer-vision)** — find the current SOTA + code for any task when you need it.\n", "tasks": 0}]}, {"slug": "fde", "name": "Forward Deployed Engineer", "docs": [{"id": "README", "file": "README.md", "title": "Overview", "md": "# Forward Deployed Engineer (FDE)\n\n## What the role is\n\nA Forward Deployed Engineer is a software engineer embedded directly with customers. Instead of building one product for everyone, you take your company's platform (Palantir Foundry, Claude, OpenAI's APIs, Databricks) into a specific customer's messy real-world environment and make it deliver value — writing integration code, building RAG pipelines and agents, running workshops, and owning the outcome end-to-end.\n\nPalantir invented the role; in 2025–2026 OpenAI, Anthropic, Databricks, Google, and most serious AI startups adopted it because deploying AI into enterprises requires someone who is half engineer, half consultant.\n\n## Who hires FDEs\n\n| Company | Flavor |\n|---|---|\n| Palantir | The original. Heavy on decomposition and ambiguity. Foundry/AIP deployments. |\n| OpenAI | Production LLM systems on their APIs; heavy focus on evals (\"how do you know it's working?\"). |\n| Anthropic | Applied AI team; Claude integrations, MCP servers, agents; mission alignment matters. |\n| Databricks | Data-flavored: Spark, SQL, lakehouse architecture, customer workshops. |\n| AI startups | Broadest scope — you may be the entire deployment team. Easiest entry point for early-career. |\n\n## The skills profile (T-shaped)\n\n- **Deep bar**: strong practical coding (usually Python) — you must build working software fast.\n- **Broad bar**: SQL and data pipelines, APIs, cloud basics, LLM stack (prompting, RAG, agents, evals, MCP).\n- **Vertical bar (what actually differentiates FDEs)**: decomposing vague problems, communicating with non-technical stakeholders, radical ownership, product sense.\n\n## What's in this package\n\n| File | What it's for |\n|---|---|\n| [roadmap.md](roadmap.md) | 6-week intensive study plan (~3–4 hrs/day) with checkboxes |\n| [interview-prep.md](interview-prep.md) | Interview loops by company, question bank, final-week drill schedule |\n| [qa-bank.md](qa-bank.md) | Detailed questions **with answers**: LLM stack, coding walkthroughs, worked design & decomposition examples |\n| [resources.md](resources.md) | Every free resource + free certifications, with why-this-one notes |\n\n## How to use it\n\n1. Work through `roadmap.md` top to bottom, checking off tasks. Don't skip milestone projects — they *are* the prep (FDE interviews test building, not trivia).\n2. Read `interview-prep.md` at the start (know what you're training for), then live in it during week 6.\n3. Everything links to a free resource. If a link dies, run `python tools/check_links.py roadmaps/fde/` and find a replacement in `resources.md` alternatives.\n\n**Realistic expectation for a student**: big labs (OpenAI/Anthropic) rarely hire FDEs straight out of school — target Palantir new-grad FDE (called Forward Deployed Software Engineer), Databricks, and AI startups first. The same prep covers all of them, and startup FDE experience is the standard springboard to lab FDE roles in 1–2 years.\n", "tasks": 0}, {"id": "roadmap", "file": "roadmap.md", "title": "Roadmap", "md": "# FDE Roadmap — 6 Weeks Intensive (~3–4 hrs/day)\n\nEvery task links to a free resource (details and alternatives in [resources.md](resources.md)).\nWeeks 1–2 build fundamentals, 3–4 build the AI stack, 5–6 build interview-specific muscle.\nIf you already know a topic, do its milestone anyway — if it's easy, skip ahead.\n\n---\n\n## Week 1 — Python, Git, SQL foundations\n\n**Goal:** write clean Python fast, use Git naturally, query data confidently.\n\n- [ ] Day 1–3: [CS50P](https://cs50.harvard.edu/python/) — do lectures 0–5 (functions, conditionals, loops, exceptions, libraries). Skip what you know; do the problem sets, not just videos. *(~3 hrs/day)*\n- [ ] Day 3: [Learn Git Branching](https://learngitbranching.js.org/) — main + remote lessons. *(2 hrs)*\n- [ ] Day 4–5: CS50P lectures 6–8 (file I/O, regex, OOP) + problem sets.\n- [ ] Day 5–7: [SQLBolt](https://sqlbolt.com/) all lessons, then [SQL Practice](https://www.sql-practice.com/) — 20+ queries including JOINs and GROUP BY. *(~2 hrs/day)*\n- [ ] Daily from Day 4: 1 easy problem on [NeetCode](https://neetcode.io/roadmap) (Arrays & Hashing) to warm up.\n\n**Milestone project:** a CLI tool in Python that reads a CSV (find any dataset on [Kaggle](https://www.kaggle.com/datasets)), loads it into SQLite, and answers questions via SQL (e.g., \"top 10 X by Y\"). Commit it to GitHub with a README. *(~4 hrs)*\n\n---\n\n## Week 2 — DSA patterns + practical backend\n\n**Goal:** handle a practical coding round; FDE coding is practical, not competitive.\n\n- [ ] Day 1–5: [NeetCode roadmap](https://neetcode.io/roadmap) — Arrays & Hashing, Two Pointers, Sliding Window, Stack, Binary Search. Watch the pattern video, then solve 3–4 problems per pattern (~25 problems total). *(~2 hrs/day)*\n- [ ] Day 1–4: [FastAPI tutorial](https://fastapi.tiangolo.com/tutorial/) — through path/query params, request bodies, and response models. *(~1.5 hrs/day)*\n- [ ] Day 5: Learn to call external APIs properly: [Real Python — API Integration](https://realpython.com/api-integration-in-python/) (auth, pagination, error handling, retries).\n- [ ] Day 6–7: **Practical coding drills** (these mimic real FDE coding rounds — see [interview-prep.md](interview-prep.md)):\n  - [ ] Build a rate limiter (token bucket) in plain Python with tests.\n  - [ ] Write a robust CSV parser that survives malformed rows and reports errors.\n\n**Milestone project:** a FastAPI service exposing your Week 1 dataset — 3 endpoints, input validation, meaningful error responses, README with curl examples. *(~4 hrs)*\n\n---\n\n## Week 3 — LLM fundamentals: prompting, APIs, tool use\n\n**Goal:** be fluent in the LLM developer stack — the core of every 2026 FDE role.\n\n- [ ] Day 1–2: [Anthropic Docs — Get started + Prompt engineering](https://docs.anthropic.com/) — read the full prompt engineering section; free tier API key is enough for exercises. Alternative track: [Prompting Guide](https://www.promptingguide.ai/).\n- [ ] Day 2–3: [Anthropic courses repo](https://github.com/anthropics/courses) — work through the API fundamentals and prompt engineering interactive tutorials (Jupyter notebooks, free).\n- [ ] Day 4: Structured output + tool use / function calling — Anthropic docs tool-use section, plus the [OpenAI Cookbook](https://cookbook.openai.com/) function-calling examples (know both providers' idioms).\n- [ ] Day 5–6: [Hugging Face LLM Course](https://huggingface.co/learn/llm-course) — chapters 1–2 (how transformers/tokenizers actually work; enough depth to answer \"explain how an LLM works\" credibly).\n- [ ] Day 7: Read about production concerns: rate limiting, batching, caching, streaming, token costs — Anthropic/OpenAI docs sections on each. Write a one-page cheat sheet in your own words.\n\n**Milestone project:** a CLI chatbot with tool use — it can answer questions about your Week 1 dataset by *deciding* to call your Week 2 API (function calling), with streamed responses and graceful API-error handling. *(~5 hrs)*\n\n---\n\n## Week 4 — RAG, agents, evals (the take-home simulator)\n\n**Goal:** build the exact artifacts FDE take-homes ask for: a RAG system, an agent, an eval harness.\n\n- [ ] Day 1–2: [DeepLearning.AI short courses](https://www.deeplearning.ai/short-courses/) — take one RAG-focused short course (all free, ~1.5 hrs each).\n- [ ] Day 2–3: Build a minimal RAG pipeline **from scratch, no framework**: chunk documents → embed → store in SQLite/numpy → retrieve top-k → answer with citations. Understanding beats frameworks in interviews.\n- [ ] Day 4: [Hugging Face Agents Course](https://huggingface.co/learn/agents-course) — unit 1 (agent fundamentals) + skim one framework unit.\n- [ ] Day 5: [Model Context Protocol docs](https://modelcontextprotocol.io/) — read the intro and build the quickstart MCP server (Anthropic FDE postings name MCP explicitly).\n- [ ] Day 6–7: **Evals** — the highest-leverage differentiator: read [Anthropic docs on evals](https://docs.anthropic.com/) (define success criteria, build eval sets) and [Hamel Husain — Your AI Product Needs Evals](https://hamel.dev/blog/posts/evals/). Then build a small eval harness for your RAG app: 15 question/expected-answer pairs, automated scoring (exact match + LLM-as-judge), a results table.\n\n**Milestone project (treat as a real take-home, 5-hour budget):** \"A customer wants to ask questions about their internal docs.\" Build RAG over a public doc set, an eval harness proving it works, and record a 5-minute walkthrough video (OpenAI's real take-home format includes video). *(~5 hrs)*\n\n---\n\n## Week 5 — System design, decomposition, customer skills\n\n**Goal:** train the rounds that actually fail FDE candidates.\n\n- [ ] Day 1–2: [System Design Primer](https://github.com/donnemartin/system-design-primer) — study the core concepts section (load balancing, caching, queues, DB scaling). You need vocabulary and trade-offs, not exhaustive depth.\n- [ ] Day 2–3: LLM system design: sketch (on [Excalidraw](https://excalidraw.com/)) a production architecture for \"enterprise chatbot over 1M internal documents, 10k users\" — include ingestion, retrieval, guardrails, evals/monitoring, cost & latency budgets, auth/trust boundaries. Then compare against a reference: search \"LLM system design\" on the [Exponent blog](https://www.tryexponent.com/blog).\n- [ ] Day 3–5: **Decomposition practice** — the Palantir-signature round (~40% pass rate). Learn the framework in [interview-prep.md](interview-prep.md), then write full decompositions (45 min timed, on paper/Excalidraw) for three prompts:\n  - [ ] \"A hospital network wants to reduce ER wait times.\"\n  - [ ] \"An airline wants to use AI to reduce flight delays.\"\n  - [ ] \"A bank wants to automate its loan-document review.\"\n- [ ] Day 6: Product/customer sense: read Palantir's own writing on the FDE model — [Palantir blog](https://blog.palantir.com/) (\"Forward Deployed Engineers\" / open-ended interview posts) — and the [Exponent FDE interview guide](https://www.tryexponent.com/blog/forward-deployed-engineer-interview-the-definitive-2026-guide-fde).\n- [ ] Day 7: Draft your 6–8 STAR behavioral stories (template in [interview-prep.md](interview-prep.md)).\n\n**Milestone:** one polished decomposition writeup + your architecture diagram, explained out loud to a friend (or recorded) in under 10 minutes.\n\n---\n\n## Week 6 — Interview drills\n\n**Goal:** convert knowledge into performance. Live in [interview-prep.md](interview-prep.md) this week — it has the day-by-day drill schedule.\n\n- [ ] 2× mock coding interviews on [Pramp](https://www.pramp.com/) (free peer mocks).\n- [ ] 1× timed practical coding drill daily (rotate: rate limiter, log parser, streaming consumer, mini-RAG — question bank in interview-prep.md).\n- [ ] 2× timed decomposition cases (new prompts, 45 min hard stop).\n- [ ] 1× client-simulation role-play with a friend: present your Week 4 project, have them push back (\"too expensive\", \"it hallucinated yesterday\", \"why not fine-tune?\").\n- [ ] Rehearse STAR stories out loud; refine the weak ones.\n- [ ] Polish GitHub: all 4 milestone projects with READMEs — this is your portfolio; FDE hiring managers read it.\n- [ ] Apply: Palantir new-grad FDSE, Databricks, and 10+ AI startups (filter \"forward deployed\" on job boards).\n\n**Final milestone:** a complete self-run mock loop in one day — coding (60 min) → system design (60 min) → decomposition (45 min) → behavioral (45 min). Score yourself with the rubrics in interview-prep.md.\n", "tasks": 36}, {"id": "interview-prep", "file": "interview-prep.md", "title": "Interview Prep", "md": "# FDE Interview Prep\n\nWhat the loops look like, what each round tests, real question types, and the week-6 drill schedule.\n\n---\n\n## The generic FDE loop (5–8 stages, 3–6 weeks)\n\n1. **Recruiter screen** (30 min) — background, motivation, comp alignment\n2. **Hiring manager screen** (45–60 min) — past projects, ownership stories\n3. **Coding** (60 min) — practical engineering, not LeetCode hard\n4. **System design** (60 min) — real deployment architecture\n5. **Decomposition / case study** (45–60 min) — vague enterprise problem\n6. **Client simulation** (45 min) — role-play with a \"customer\"\n7. **Behavioral** (45 min) — STAR stories, culture fit\n\n## Company-specific loops\n\n### Palantir (FDSE — best new-grad entry point)\n- Loop: recruiter → technical phone screen → onsite of 3–5 rounds (coding in Python, system design/data architecture, 1–2 behavioral/culture).\n- **The decomposition round is the differentiator**: ~40% pass rate, ~30% of total weight. A vague customer problem, 45–60 min, graded on *process* not conclusion.\n- Read their published guidance on open-ended questions ([Palantir blog](https://blog.palantir.com/)).\n\n### OpenAI\n- ~7 stages compressed into 3–4 weeks: recruiter → technical screen → 2 coding rounds → LLM system design → behavioral customer-empathy → values conversation.\n- **Take-home**: ~5 hours building on their APIs (RAG system, agent, or eval harness) + a **video walkthrough**. Follow-ups go deep on design choices: RAG vs fine-tuning vs prompting, guardrails, evals.\n- Signature question energy: *\"How do you know it's working?\"* — always have an eval answer.\n- Production depth expected: rate limiting, batching, caching, prompt robustness, token cost & latency budgets.\n\n### Anthropic (Applied AI)\n- 5 stages: recruiter → technical phone screen → take-home or live coding → **customer-conversation simulation** → onsite system design.\n- The customer-conversation round filters ~60% of candidates who passed coding — practice the client role-play seriously.\n- System design skews toward **eval harnesses** (\"can you measure whether Claude is actually helping this customer?\") more than RAG architecture.\n- Coding is practical: rate limiters, distributed queues. Mission alignment is genuinely screened.\n\n### Databricks\n- Data-flavored: Spark, SQL, data modeling, lakehouse architecture, plus customer-workshop collaboration scenarios.\n\n---\n\n## Question bank by round\n\n### Coding (practical)\n- Build a rate limiter (token bucket / sliding window) with tests.\n- Parse a messy CSV/log file; handle malformed rows; report errors usefully.\n- Consume a paginated/streaming API with retries and backoff.\n- Build a minimal RAG pipeline: chunk → embed → retrieve → answer.\n- Deduplicate/join two messy datasets (the \"customer data is garbage\" special).\n- **Graded on:** clean code, narrating your thinking, catching your own bugs, handling edge cases without being told.\n\n### System design\n- \"Design a chatbot over a customer's 1M internal documents for 10k employees.\"\n- \"Design the data pipeline to sync a customer's on-prem SQL Server into our platform daily.\"\n- \"A customer wants an agent that files support tickets automatically. Design it, including guardrails.\"\n- **Graded on:** data flow mapping, trust boundaries/auth, observability, failure modes, cost/latency budgets, and proposing a *walking-skeleton MVP first* then iterating.\n\n### Decomposition / case (train hardest for this)\nPrompts are deliberately vague: *\"A shipping company wants to reduce fuel costs.\"* / *\"A hospital wants to cut ER wait times.\"*\n\n**The framework:**\n1. **Clarify before solving** (5–10 min): Who is the user? What does success look like, in numbers? What data exists? What constraints (regulatory, timeline, budget)?\n2. **State assumptions explicitly** when answers aren't available.\n3. **Decompose** the problem into 3–5 workstreams; draw the map.\n4. **Prioritize** — which piece first and *why* (value × feasibility).\n5. **Propose a minimal end-to-end slice** (walking skeleton) before any grand architecture.\n6. **Name trade-offs and risks** transparently; say what would change your mind.\n\n**Instant-fail behaviors:** jumping straight to a solution, no clarifying questions, ignoring the user, treating it as a tech-stack quiz.\n\n### Client simulation\n- \"Present your solution to our CTO\" (they play a skeptical CTO).\n- \"The model gave a wrong answer in the customer's demo yesterday. The VP is angry. Handle the call.\"\n- \"The customer demands a feature that's a bad idea. Respond.\"\n- **Strong patterns:** diagnostic questions before proposals, ownership language (\"I'll own getting you an answer by Friday\"), calibrated commitments (never overpromise), translating tech → business impact, delivering bad news with a plan attached.\n\n### Behavioral (prepare 6–8 STAR stories)\nCover these themes (one story can cover two):\n1. Owned something end-to-end, including parts that weren't your fault\n2. Dealt with a difficult stakeholder/teammate\n3. Made a call with incomplete information\n4. Were wrong and reversed course\n5. Delivered under a hard deadline\n6. Explained something technical to a non-technical person\n7. Went beyond the ask because it was right for the user/customer\n8. Failed, and what you changed afterwards\n\nFormat: Situation (2 sentences) → Task → Action (the bulk — *your* actions, \"I\" not \"we\") → Result (with a number if possible).\n\n---\n\n## Week-6 drill schedule\n\n| Day | Drill (~3–4 hrs) |\n|---|---|\n| 1 | Timed practical coding (rate limiter, 60 min) + rehearse 4 STAR stories out loud |\n| 2 | [Pramp](https://www.pramp.com/) mock #1 + review; timed decomposition case (45 min, new prompt) |\n| 3 | LLM system design solo (60 min on Excalidraw, explain out loud) + rehearse other 4 STAR stories |\n| 4 | Client simulation with a friend (they play angry VP) + timed coding (log parser) |\n| 5 | Pramp mock #2 + timed decomposition case #2 |\n| 6 | **Full self-run loop:** coding 60' → design 60' → decomposition 45' → behavioral 45'. Score honestly. |\n| 7 | Patch weakest round; polish GitHub READMEs; send applications |\n\n## Self-scoring rubric (per round, 1–4)\n\n- **1** — Needed prompting to make progress; froze on edge cases or pushback\n- **2** — Reached an answer but skipped clarification/tests/trade-offs\n- **3** — Solid process: clarified, structured, verified, communicated\n- **4** — Hire signal: also flagged risks unprompted, proposed evals/next steps, made it a conversation\n\nAnything ≤2 gets a targeted retry the next day.\n\n---\n\n## Sources worth reading in full (all free)\n\n- [Exponent — FDE Interview: The Definitive 2026 Guide](https://www.tryexponent.com/blog/forward-deployed-engineer-interview-the-definitive-2026-guide-fde)\n- [Palantir blog](https://blog.palantir.com/) — their own posts on FDEs and open-ended interviews\n- [Glassdoor — Palantir FDSE interview reports](https://www.glassdoor.com/Interview/Palantir-Technologies-Forward-Deployed-Software-Engineer-Interview-Questions-EI_IE236375.0,21_KO22,56.htm) (real recent questions; needs free account)\n- [The New Stack — Why OpenAI and Anthropic are hiring FDE teams](https://thenewstack.io/forward-deployed-engineers-ai/)\n", "tasks": 0}, {"id": "qa-bank", "file": "qa-bank.md", "title": "Q&A Bank", "md": "# FDE Question & Answer Bank\n\nDetailed questions **with answers** for every FDE round. Don't memorize — rehearse out loud until you can explain each in your own words. Questions marked ⭐ come up in almost every loop.\n\n---\n\n## Part 1 — LLM & AI stack (technical screen + system design follow-ups)\n\n### ⭐ Q1. Explain how an LLM works to a smart non-technical customer.\n**Answer:** \"An LLM is a program trained on a huge amount of text to do one thing extremely well: predict the next word given everything before it. Do that billions of times during training and it internalizes grammar, facts, and reasoning patterns. When you ask it a question, it generates the answer one token at a time, each choice informed by your prompt and what it has generated so far. Two consequences matter for your business: it doesn't 'look things up' — it generates, so it can be confidently wrong (that's why we add retrieval and checks) — and it's probabilistic, so we design systems around verification, not blind trust.\"\n*Why this answer works: it's accurate, jargon-free, and pivots to deployment implications — exactly the FDE skill being tested.*\n\n### ⭐ Q2. RAG vs fine-tuning vs prompt engineering — when do you use each?\n**Answer:** Decision order is prompt → RAG → fine-tune:\n- **Prompt engineering** first: zero infra, instant iteration. Solves tone, format, task instructions, few-shot patterns. Exhaust this before anything else.\n- **RAG** when the model needs *knowledge it doesn't have*: private docs, fresh data, citations. Knowledge stays updatable without retraining, and you get source attribution — usually mandatory in enterprise.\n- **Fine-tuning** when the model needs a *behavior/skill* prompts can't reliably produce: strict output formats, domain-specific style, or latency/cost pressure (a small fine-tuned model replacing a big prompted one). It does not reliably add facts — that's the classic misuse.\n- In practice you combine them: fine-tune for format, RAG for knowledge, prompts for task framing.\n\n### ⭐ Q3. What is a context window and what are its practical implications?\n**Answer:** The maximum number of tokens (prompt + response) the model can attend to in one call. Implications: (1) you can't dump the whole knowledge base in — hence retrieval to select only relevant chunks; (2) cost and latency scale with input size, so stuffing the context wastes money; (3) models attend unevenly across very long contexts, so put critical instructions and the most relevant content near the start or end; (4) long conversations need summarization or truncation strategies or they exhaust the window.\n\n### Q4. What are embeddings and how does semantic search work?\n**Answer:** An embedding maps text to a vector such that semantically similar texts land close together. Semantic search: embed all documents offline and store the vectors; at query time embed the query and find nearest neighbors by cosine similarity. Unlike keyword search it matches *meaning* (\"reset my password\" matches \"credential recovery procedure\"). Production tip that earns points: hybrid search (keyword BM25 + vector) usually beats either alone, because exact identifiers (error codes, product names) are where pure vector search fails.\n\n### ⭐ Q5. The customer's chatbot is hallucinating. Walk through your mitigation strategy.\n**Answer:** Layered, in order of leverage:\n1. **Ground it** — RAG so answers come from retrieved sources; instruct \"answer only from the provided context; if it's not there, say you don't know.\"\n2. **Require citations** — forcing the model to cite passage IDs both reduces fabrication and makes errors auditable.\n3. **Tune retrieval** — most \"hallucinations\" are actually retrieval misses: the model never got the right passage. Check retrieval quality first before blaming the model.\n4. **Add evals** — a test set of known Q&A pairs, measure groundedness (an LLM-judge checking \"is every claim supported by the sources?\"), track it per release.\n5. **Guardrails for high-stakes paths** — confidence thresholds, human review queues for low-confidence answers, and scoped refusals.\nNever promise zero hallucination — promise a measured rate and a mitigation process. That honesty is itself an FDE interview signal.\n\n### ⭐ Q6. How do you evaluate an LLM application? (\"How do you know it's working?\")\n**Answer:** This is OpenAI's favorite question. Structure:\n1. **Define success with the customer in business terms** (deflection rate, time saved, accuracy on their gold cases) before any technical metric.\n2. **Build an eval set**: 50–200 real examples with expected outcomes — sourced from the customer's actual tickets/docs, not synthetic only.\n3. **Automate scoring**: exact/fuzzy match where answers are deterministic; **LLM-as-judge** with a rubric for open-ended answers (validate the judge against ~30 human-labeled samples first).\n4. **Evaluate components separately**: retrieval (does the right chunk appear in top-k? — recall@k) vs generation (is the answer faithful to the chunks?). Otherwise you can't debug.\n5. **Run on every change** — prompts are code; a prompt tweak that helps one case silently breaks others. CI for prompts.\n6. **Close the loop in production**: thumbs up/down, sampled human review, drift monitoring; feed failures back into the eval set.\n\n### Q7. What is MCP (Model Context Protocol) and why does it matter?\n**Answer:** An open protocol (from Anthropic) standardizing how AI applications connect to external tools and data sources. An MCP server exposes tools/resources (query the CRM, search the wiki); any MCP-compatible client can use them without custom integration code per pairing — \"USB-C for AI integrations.\" For FDEs it matters because customer deployments are mostly integration work: build one MCP server for a customer system and every agent/assistant in the org can use it. Anthropic FDE job postings name shipping MCP servers as a core deliverable.\n\n### Q8. What is an agent, and when would you *not* use one?\n**Answer:** An agent is an LLM in a loop with tools: it decides an action, executes, observes results, and repeats until done — the model does the orchestration. Don't use one when the workflow is known and fixed: if the steps are \"always extract → validate → file the ticket,\" write a pipeline with one LLM call per step — cheaper, faster, debuggable, and reliability compounds (95% per step across 5 autonomous decisions is ~77%). Use agents when paths genuinely vary per input and can't be enumerated. Interview signal: engineers who reach for the simplest thing that works.\n\n### Q9. How do you manage cost and latency in a production LLM system?\n**Answer:** - **Model routing**: small/fast model for easy cases (classification, routing), big model only where quality demands it.\n- **Caching**: prompt caching for repeated system prompts and doc contexts (huge in RAG); response caching for repeated queries.\n- **Prompt size discipline**: retrieval instead of context-stuffing; trim boilerplate; token budgets per component.\n- **Streaming** to cut *perceived* latency; **batching** for offline workloads (batch APIs are ~50% cheaper).\n- **Measure first**: per-request token logs by feature, then optimize the actual top cost drivers.\n\n### Q10. Temperature and other sampling parameters — what do they do?\n**Answer:** Temperature scales the randomness of next-token selection: low (0–0.3) → deterministic, repeatable — right for extraction, classification, code, factual Q&A; higher (0.7–1.0) → varied, creative — right for brainstorming and drafting. Enterprise default is low. Related: top-p (sample from smallest set of tokens with cumulative probability p), max_tokens (hard response cap — set it to control cost), stop sequences. Reproducibility note: even temperature 0 isn't perfectly deterministic across runs/versions — build evals rather than relying on fixed outputs.\n\n---\n\n## Part 2 — Coding round walkthroughs\n\nThe bar: working code, narrated thinking, edge cases caught unprompted, tests offered at the end.\n\n### ⭐ Q11. Build a rate limiter.\n**Talk track:** clarify scope first — \"Per-client or global? In-process or distributed? What should happen on limit — reject or queue?\" Then: \"I'll start with a token bucket per client, in-process, rejecting over-limit calls — and note how it extends to Redis for multi-instance.\"\n\n```python\nimport time\n\nclass TokenBucket:\n    def __init__(self, rate: float, capacity: int):\n        self.rate = rate          # tokens added per second\n        self.capacity = capacity  # burst size\n        self.tokens = float(capacity)\n        self.last = time.monotonic()   # monotonic: immune to clock changes\n\n    def allow(self) -> bool:\n        now = time.monotonic()\n        self.tokens = min(self.capacity, self.tokens + (now - self.last) * self.rate)\n        self.last = now\n        if self.tokens >= 1:\n            self.tokens -= 1\n            return True\n        return False\n```\n\n**Edge cases to name unprompted:** thread safety (wrap in a lock), `time.monotonic()` vs `time.time()` (clock jumps), burst behavior at t=0 (full bucket is usually desired), distributed version (atomic Redis Lua script), and what the caller does on `False` (backoff with jitter). Offer tests: burst of `capacity` allowed, next call rejected, allowed again after `1/rate` seconds.\n\n### Q12. Parse a messy CSV robustly.\n**Talk track:** \"Real customer files have encoding issues, malformed rows, and surprise delimiters — my design goals are: never crash, never silently drop data, always report what was skipped and why.\"\nKey moves: use the `csv` module (never `line.split(',')` — quoted fields contain commas); `encoding=\"utf-8-sig\"` with a `latin-1` fallback; validate each row (column count, type coercion) in a try/except; collect `(line_number, reason, raw_row)` for every reject; return `(good_rows, errors)` and **summarize the error patterns** — that summary is what you'd show the customer. Mention: for 10GB files, stream row-by-row rather than loading into memory.\n\n### Q13. Consume a paginated API with retries.\n**Talk track:** pagination loop + retry wrapper with exponential backoff and jitter. Name the behaviors that separate production code from demo code: honor `Retry-After` on 429; retry only retryable statuses (429, 5xx) — never 4xx client errors; cap total attempts; use a session for connection reuse; make it a generator so callers stream pages instead of buffering everything; log request IDs for supportability.\n\n```python\nimport time, random, requests\n\ndef get_with_retries(url, params, max_attempts=5):\n    for attempt in range(max_attempts):\n        resp = requests.get(url, params=params, timeout=30)\n        if resp.status_code == 200:\n            return resp.json()\n        if resp.status_code == 429 or resp.status_code >= 500:\n            wait = float(resp.headers.get(\"Retry-After\",\n                         (2 ** attempt) + random.random()))\n            time.sleep(wait)\n            continue\n        resp.raise_for_status()   # 4xx: don't retry, fail loudly\n    raise RuntimeError(f\"gave up after {max_attempts} attempts\")\n```\n\n### Q14. Build a minimal RAG pipeline live.\n**Talk track:** sketch the four stages, then code simply: chunk (fixed-size with overlap — say you'd prefer paragraph-boundary chunking with more time), embed (any embeddings API), store (list of vectors + numpy is fine at interview scale — \"I'd reach for a vector DB at ~100k+ chunks, not before\"), retrieve (cosine similarity top-k), generate (prompt with numbered chunks, instruct \"answer only from context, cite chunk numbers\"). Then *offer the eval*: \"with 15 more minutes I'd add 10 Q&A pairs and measure retrieval recall@k separately from answer faithfulness\" — that sentence is often the strongest hire signal in the round.\n\n---\n\n## Part 3 — System design: worked example\n\n### ⭐ Q15. \"Design a chatbot over a customer's 1M internal documents for 10k employees.\"\n\n**1. Clarify (5 min):** What docs (wikis, PDFs, tickets)? Update rate? Permissions — can every employee see every doc (almost always **no** — this decision dominates the design)? Latency target? Cloud or on-prem constraints? Success metric (deflection? time-to-answer)?\n\n**2. Walking skeleton first:** \"V1: ingest one high-value doc source, hybrid search, LLM with citations, measure with 50 gold Q&As — in front of pilot users in 2 weeks. Then iterate.\" Saying this before the architecture is the FDE signal.\n\n**3. Architecture:**\n- **Ingestion**: connectors per source → parse (PDF/HTML → text) → chunk (semantic boundaries, ~500 tokens, overlap) → embed → vector index, **storing ACL metadata on every chunk**. Incremental sync on document change events; nightly full reconciliation.\n- **Query path**: user auth → query rewrite (resolve \"it/that\" from chat history) → hybrid retrieval (BM25 + vector) **filtered by user's permissions at query time** → rerank top-50 → top-5 → prompt with citations required → stream response.\n- **Trust boundaries**: retrieval filter enforces ACLs (never let the model see chunks the user can't); PII redaction in logs; prompt-injection awareness for doc content (docs are untrusted input to the prompt).\n- **Failure modes**: embedding API down → keyword-only degraded mode; no relevant chunks → honest \"not found\" beats a guess; per-user rate limits.\n\n**4. Evals & monitoring:** retrieval recall@k on a gold set; groundedness via LLM-judge; thumbs up/down feeding a review queue; dashboards for latency (p95), cost/query, deflection.\n\n**5. Costs (rough numbers earn credibility):** 1M docs ≈ 4M chunks; embedding once ≈ low hundreds of dollars; queries dominated by LLM calls — at 10k employees × a few queries/day × ~3k tokens/query, estimate and name the levers (caching, small-model routing, prompt caching for shared context).\n\n---\n\n## Part 4 — Decomposition: worked example\n\n### ⭐ Q16. \"A hospital network wants to reduce ER wait times.\" (45 min, Palantir-style)\n\n**Phase 1 — Clarify (never skip; ~8 min of questions):**\n- \"What's driving this now — a specific incident, a regulator, board pressure?\" (finds the *real* goal)\n- \"How is wait time measured — door-to-triage, door-to-doctor, door-to-discharge?\" (they differ; pick with the stakeholder)\n- \"Current baseline and target? Which hospitals — all, or the worst two?\"\n- \"What data exists — EHR timestamps, staffing rosters, bed status? How accessible?\"\n- \"Who owns this problem day-to-day — ER director? What have they already tried?\"\n\n**Phase 2 — Decompose the wait (draw this):** total ER time = arrival→triage + triage→bed + bed→doctor + doctor→decision + decision→exit (admit/discharge). Each segment has different causes and owners: triage staffing, bed availability (often blocked by *inpatient* discharge upstream!), physician coverage, lab/imaging turnaround, discharge logistics.\n\n**Phase 3 — Prioritize with data:** \"First deliverable: instrument the funnel — a dashboard of time-per-segment per hospital per shift, from EHR timestamps. Cheap, fast, and it tells us where the actual bottleneck is instead of guessing. In many hospitals the surprise finding is 'bed→doctor' blocked by inpatient discharge — meaning the fix isn't in the ER at all.\"\n\n**Phase 4 — Minimal end-to-end slice:** pick the worst segment at the worst hospital; ship one intervention + measurement loop (e.g., if triage→bed dominates on weekend nights, model bed-turnover and trial a discharge-coordination change; measure against last month's baseline).\n\n**Phase 5 — Risks & trade-offs, stated unprompted:** data quality (timestamps entered late during rushes — validate before trusting), Goodhart's law (optimizing door-to-doctor can create hallway medicine — pair with quality metrics), stakeholder reality (nurses' workflow buy-in beats an elegant model), and \"if the data shows the bottleneck is upstream of the ER, the project scope must change — I'd rather renegotiate scope than optimize the wrong thing.\"\n\n**Grading reality:** interviewers grade the *shape of your process* — clarify → decompose → instrument → prioritize → thin slice → risks. A confident wrong guess at the bottleneck scores worse than \"here's how we'd find out in week one.\"\n\n---\n\n## Part 5 — Client simulation\n\n### ⭐ Q17. \"Your demo hallucinated in front of the customer's VP yesterday. The VP is angry on today's call. Go.\"\n**Model answer:** \"Thanks for flagging it directly — you're right that answer was wrong, and I understand why it damages confidence. Here's what we know: [one-sentence diagnosis — e.g., the retrieval layer returned an outdated policy doc]. Three things we're doing: fixing that specific failure, adding it to our test suite so it can't regress silently, and reviewing the eval results for this whole category. I want to be straight with you: no AI system will be at 100%, so the plan is a measured accuracy on your own test cases — currently X% — plus citations so every answer is checkable, and human review on the high-stakes paths. I'll send the fix summary and updated numbers by Friday. Can we also pick the 20 questions that matter most to your team, so we over-index the testing where it counts?\"\n*Structure: acknowledge without groveling → diagnose specifically → systemic fix, not just patch → honest expectation-setting → concrete commitment with a date → pull them into the solution.*\n\n### Q18. \"The customer demands a feature you think is a bad idea.\"\n**Answer pattern:** Diagnose before arguing: \"Help me understand the workflow where you'd use this\" — the request is usually a symptom of a real need with a better solution. Then: restate their goal, show you take it seriously, present the trade-off concretely (\"we can do X, but it costs us Y in reliability — here's an alternative reaching the same goal\"), and if they still insist and it's not harmful, commit genuinely with agreed success criteria measured after launch. If it *is* harmful (security/compliance), that's a firm no with reasons and an escalation path. Never a bare \"no,\" never a fake \"yes.\"\n\n### Q19. \"You'll miss a deadline you committed to. Handle it.\"\n**Answer pattern:** Tell them the moment *you* know — bad news early is a gift, late is a betrayal. Come with a plan, not just an apology: what's done, what's not, why (brief, no blame-shifting), and two options (\"full scope by +2 weeks, or the core workflow on the original date and the reporting module two weeks after — I recommend the second; here's why\"). Give the customer the decision. Then rebuild trust with visible frequent progress.\n\n### Q20. \"Walk me through how you'd run a discovery call with a new customer.\"\n**Answer pattern:** Goal: leave knowing their business problem, success criteria, data reality, and political landscape — not having pitched features. Structure: (1) their world first — \"walk me through how this process works today\" and where it hurts; (2) quantify the pain (hours, dollars, errors); (3) define success in their numbers; (4) map data and systems (what exists, who owns it, access process); (5) identify the champion and the skeptic; (6) close with a concrete next step owned by a name and a date. Talk ratio ≈ 30/70.\n\n---\n\n## Part 6 — Behavioral (STAR skeletons to adapt)\n\nPrepare 6–8 stories from *your* experience (projects, internships, coursework, clubs count). Below: the shape of a strong answer.\n\n### ⭐ Q21. \"Tell me about a time you owned something end-to-end.\"\n**Skeleton:** S: \"Team project X was failing because nobody owned integration.\" T: \"I took responsibility for the end-to-end result, not just my module.\" A: \"Mapped the gaps, fixed the two integration bugs *outside* my area, set up a shared test we ran before every merge, coordinated the final demo.\" R: \"Shipped on time; the professor/client specifically called out reliability. Lesson: ownership means the outcome, including parts that 'aren't yours.'\"\n*FDE-specific: pick a story where you crossed a boundary (technical→people, your code→someone else's) — that's the role.*\n\n### Q22. \"Tell me about a time you were wrong.\"\n**Skeleton:** name the belief, what evidence changed your mind, how fast you reversed, what process changed after. \"I insisted on architecture A; two weeks of data showed the bottleneck was elsewhere; I said so in standup, we switched to B, and I started prototyping-before-committing for design bets.\" Interviewers are testing whether you can update — FDEs who can't admit errors to customers are dangerous.\n\n### Q23. \"Explain something technical to a non-technical person — how do you do it?\"\n**Answer pattern:** start from *their* goal, not the technology; use one concrete analogy anchored in their domain; state implications (\"what this means for you is…\"); check understanding by asking them to make a decision with the information — comprehension shows in decisions, not nods. Then give a 30-second live example (explain RAG to a claims manager: \"it's like giving the AI an open-book exam with *your* manuals instead of asking it to answer from memory — so answers cite pages, and updating the manual updates the answers\").\n\n### Q24. \"Why FDE and not regular software engineering?\"\n**Answer pattern (make it yours):** \"I want the feedback loop of watching real users hit real problems — the moment where the demo meets the customer's messy data is where I learn fastest. I like owning outcomes, not tickets: the FDE deal is 'make it valuable, whatever that takes,' which is more code some days and more listening other days. And 2026 is a once-in-a-career window where deploying AI into real organizations is the industry's bottleneck — I'd rather be where the hard, unsolved part is.\" Back it with one story where you enjoyed exactly this (a hackathon demo for a real user, a tool you built for a club and iterated on feedback).\n\n---\n\n## How to drill this bank\n\n- **Breadth Qs (1–10):** answer out loud, unscripted, as if teaching. If you stumble, reread the source in [resources.md](resources.md), retry the next day.\n- **Coding (11–14):** actually code them, timed at 40 minutes, narrating aloud.\n- **Design/decomposition (15–16):** whiteboard on [Excalidraw](https://excalidraw.com/), 45-minute hard stop, then compare against the worked example.\n- **Simulation/behavioral (17–24):** rehearse with a friend playing hostile; record yourself once — you'll fix more from one playback than five silent readthroughs.\n", "tasks": 0}, {"id": "resources", "file": "resources.md", "title": "Resources", "md": "# FDE Free Resources\n\nEverything the [roadmap](roadmap.md) links to, plus alternatives. All free (free tier at most). One primary per topic — don't collect courses, finish them.\n\n## Python\n- **[CS50P — Harvard's Intro to Programming with Python](https://cs50.harvard.edu/python/)** — the best free structured Python course; problem sets force real practice. *(~30 hrs used selectively; skip lectures you know)*\n- Alt: [Python official tutorial](https://docs.python.org/3/tutorial/) — terse, good if you already program.\n\n## Git\n- **[Learn Git Branching](https://learngitbranching.js.org/)** — interactive visual Git; main + remote tracks are enough. *(~3 hrs)*\n\n## SQL\n- **[SQLBolt](https://sqlbolt.com/)** — fastest zero-to-JOINs interactive tutorial. *(~4 hrs)*\n- **[SQL Practice](https://www.sql-practice.com/)** — free query drills against realistic schemas. *(~4 hrs)*\n- Alt: [SQLZoo](https://sqlzoo.net/wiki/SQL_Tutorial).\n\n## DSA\n- **[NeetCode Roadmap](https://neetcode.io/roadmap)** — pattern-ordered problems with the best free video explanations; free tier is plenty. Do ~25–40 problems across the first 6 patterns; FDE coding rounds are practical, so don't grind past that. *(~20 hrs)*\n- Alt: [roadmap.sh DSA roadmap](https://roadmap.sh/datastructures-and-algorithms) for a topic map.\n\n## APIs & backend\n- **[FastAPI tutorial](https://fastapi.tiangolo.com/tutorial/)** — the framework AI teams actually use; docs double as a course. *(~6 hrs)*\n- **[Real Python — API Integration](https://realpython.com/api-integration-in-python/)** — consuming APIs properly: auth, pagination, retries. *(~2 hrs)*\n\n## LLM fundamentals & prompting\n- **[Anthropic documentation](https://docs.anthropic.com/)** — get-started, prompt engineering, tool use, evals; free API tier for exercises. *(~6 hrs reading + practice)*\n- **[Anthropic courses (GitHub)](https://github.com/anthropics/courses)** — free interactive notebooks: API fundamentals, prompt engineering, tool use, evals. *(~8 hrs)*\n- **[OpenAI Cookbook](https://cookbook.openai.com/)** — worked examples incl. function calling; know both providers. *(~3 hrs selectively)*\n- **[Hugging Face LLM Course](https://huggingface.co/learn/llm-course)** — chapters 1–2 for how transformers/tokenizers work. *(~5 hrs)*\n- Alt: [Prompting Guide](https://www.promptingguide.ai/) — provider-neutral prompting reference.\n\n## RAG, agents, MCP\n- **[DeepLearning.AI short courses](https://www.deeplearning.ai/short-courses/)** — free ~1.5 hr courses; pick one RAG and one agents course. *(~3 hrs)*\n- **[Hugging Face Agents Course](https://huggingface.co/learn/agents-course)** — agent fundamentals + frameworks + agentic RAG. *(~6 hrs for units 1–2)*\n- **[Model Context Protocol](https://modelcontextprotocol.io/)** — intro + quickstart server; named in Anthropic FDE postings. *(~3 hrs)*\n- Alt: [LangChain Academy](https://academy.langchain.com/) — free LangGraph course if you want a framework deep-dive.\n\n## Evals (highest-leverage topic per hour)\n- **[Hamel Husain — Your AI Product Needs Evals](https://hamel.dev/blog/posts/evals/)** — the canonical practitioner essay. *(~1 hr)*\n- Anthropic docs evals section (linked above) — success criteria and eval-set design.\n\n## System design\n- **[System Design Primer (GitHub)](https://github.com/donnemartin/system-design-primer)** — core concepts section only: caching, queues, load balancing, DB scaling. *(~6 hrs)*\n- **[Excalidraw](https://excalidraw.com/)** — free whiteboard; practice every design here since interviews use one.\n- [Exponent blog](https://www.tryexponent.com/blog) — free articles incl. LLM system design and the FDE guide.\n\n## Interview intel & practice\n- **[Exponent — FDE Interview 2026 Guide](https://www.tryexponent.com/blog/forward-deployed-engineer-interview-the-definitive-2026-guide-fde)** — the best single free FDE interview writeup. *(~1 hr)*\n- **[Pramp](https://www.pramp.com/)** — free peer-to-peer mock interviews. *(2 × 1 hr)*\n- **[Palantir blog](https://blog.palantir.com/)** — FDE model and open-ended interview guidance from the source.\n- **[Glassdoor Palantir FDSE interview reports](https://www.glassdoor.com/Interview/Palantir-Technologies-Forward-Deployed-Software-Engineer-Interview-Questions-EI_IE236375.0,21_KO22,56.htm)** — real recent questions (free account required).\n- **[The New Stack — Forward Deployed Engineers](https://thenewstack.io/forward-deployed-engineers-ai/)** — why labs are hiring FDEs; good narrative for \"why this role\" answers.\n\n## Free certifications (résumé line items)\n\nCertificates don't replace projects, but they get past résumé filters and show initiative. All genuinely free:\n\n- **[Hugging Face Agents Course certificate](https://huggingface.co/learn/agents-course)** — pass the final GAIA-based challenge; the most credible free GenAI cert right now for FDE-type roles.\n- **[Databricks Academy — free self-paced trainings](https://www.databricks.com/learn/training/home)** — the free Generative AI / Lakehouse Fundamentals accreditations; directly relevant if you target Databricks FDE.\n- **[Kaggle Learn certificates](https://www.kaggle.com/learn)** — Python, Pandas, Intro ML micro-course certificates; quick wins in week 1–2.\n- **[freeCodeCamp certifications](https://www.freecodecamp.org/learn)** — Data Analysis with Python / Machine Learning with Python; substantial (each ~300 hrs claimed, faster in practice) and fully free.\n- **[Elements of AI](https://www.elementsofai.com/)** — University of Helsinki; free certificate; light technically but a fine first line item.\n- **[Google Cloud Skills Boost — intro GenAI courses](https://www.cloudskillsboost.google/)** — several introductory generative-AI badges are free; useful if a target company is GCP-based.\n- **[Microsoft Learn — AI training paths](https://learn.microsoft.com/en-us/training/)** — free modules and badges (Azure AI fundamentals learning path; the exam itself is paid, the training isn't).\n\nPriority for FDE: HF Agents cert → Databricks GenAI Fundamentals → Kaggle certs. Skip cert-collecting beyond that — a deployed project with an eval table beats five more badges.\n\n## Project fuel\n- **[Kaggle Datasets](https://www.kaggle.com/datasets)** — free datasets for milestone projects.\n", "tasks": 0}]}, {"slug": "remote-ai-career", "name": "Remote AI Career", "docs": [{"id": "README", "file": "README.md", "title": "Overview", "md": "# Remote AI Career — High-Salary Strategy\n\nThis track is different from the other two: it's not about *learning skills* (the [AI/ML Engineer roadmap](../ai-ml-engineer/README.md) is your skill spine) — it's about **converting those skills into a well-paid remote job**. Job hunting is a parallel skill, and for remote-from-anywhere roles it matters as much as the technical bar.\n\n## The honest math first\n\nEarly-career + remote + high salary is the hardest combination in tech. Here's the realistic landscape (2026, India-based numbers; scale to your market):\n\n| Path | Year-1 reality | Year 2–3 potential |\n|---|---|---|\n| Local/hybrid product company | ₹6–18 LPA (top companies more) | ₹20–40 LPA, then go remote with leverage |\n| Direct remote FTE at a global startup | Rare for freshers; possible with a standout portfolio | $40–80k/yr (₹33–67 LPA) as mid-level |\n| Freelance/contract (US clients) | $15–30/hr part-time while studying | $40–70/hr with shipped client work |\n| \"Talent platform\" remote (Turing, Arc, etc.) | Possible after ~1 yr experience | Steady USD contracts, less negotiation power |\n\nTwo facts to internalize:\n\n1. **Salary follows scarcity, not effort.** The high remote salaries ($100k+ median for senior remote AI engineers) go to people with *proof of shipped AI systems*. GenAI (RAG, agents, evals) is where demand most outstrips supply — that's your wedge, and it's exactly what the AI/ML roadmap builds.\n2. **The fastest route to a great remote salary is usually not a great first salary.** One year of real experience — even at modest local pay or freelance rates — multiplies your remote market value more than any certification. Optimize year 1 for *proof*, years 2+ for *pay*.\n\n## The strategy: three routes, run in parallel\n\nYou don't pick one — you run all three simultaneously and take the best offer:\n\n- **Route A — Direct remote FTE**: apply to remote-first AI startups (not big labs) that hire globally. Low hit-rate for freshers but non-zero, and the applications sharpen your positioning. Your portfolio does the heavy lifting.\n- **Route B — Freelance → full-time**: AI automation gigs (chatbots, RAG over business docs, workflow agents) for small businesses. Lower prestige, immediate USD income, and \"3 shipped client projects\" converts to full-time remote offers fast. The [FDE package's](../fde/README.md) customer-communication skills are gold here.\n- **Route C — Local first, remote at +18 months**: take a solid local/hybrid AI role, keep the portfolio and network warm, jump to USD remote as a mid-level. Statistically the highest-probability path to $60k+ remote.\n\n## What's in this package\n\n| File | What it's for |\n|---|---|\n| [roadmap.md](roadmap.md) | 8-week action plan (positioning → pipeline → offers), run *alongside* the AI/ML skill roadmap |\n| [interview-prep.md](interview-prep.md) | Remote hiring loops, remote-specific Q&A with answers, **salary negotiation scripts**, scam red flags |\n| [resources.md](resources.md) | Job boards that actually have remote AI roles, freelance platforms, salary data, communities |\n\n## Positioning rule that governs everything\n\nRemote hiring is async-trust hiring: the employer must believe you'll deliver without supervision, based only on artifacts they can inspect. Everything in the roadmap serves one sentence a hiring manager should be able to say after 5 minutes of Googling you: *\"This person ships real AI systems, documents them clearly, and communicates like a professional.\"*\n", "tasks": 0}, {"id": "roadmap", "file": "roadmap.md", "title": "Roadmap", "md": "# Remote AI Career Roadmap — 8 Weeks (~1 hr/day alongside skill prep)\n\nThis runs **in parallel** with the [AI/ML Engineer roadmap](../ai-ml-engineer/roadmap.md) — ideally starting around its week 3, once you have 2 portfolio pieces. One focused hour a day: the job-search layer compounds while you build skills.\n\n---\n\n## Week 1 — Positioning: become inspectable\n\nRemote employers hire what they can verify online.\n\n- [ ] Rewrite your GitHub profile README: who you are, what you build, links to your best 3 projects — each project README must have: what it does, a screenshot/demo GIF, how to run it, and (for AI projects) an eval table. Recruiters spend 90 seconds; make them count.\n- [ ] LinkedIn overhaul: headline = what you build, not \"student\" (e.g., \"Building LLM apps — RAG, agents, evals | Python\"); About section = 3 sentences + project links; turn on open-to-work for remote.\n- [ ] Create accounts where remote AI hiring actually happens: [Wellfound](https://wellfound.com/), [Himalayas](https://himalayas.app/), [We Work Remotely](https://weworkremotely.com/), [Y Combinator's Work at a Startup](https://www.workatastartup.com/).\n- [ ] Set up a simple one-page portfolio site (free: [GitHub Pages](https://pages.github.com/)) — projects, skills, contact. Nothing fancy; clarity wins.\n\n**Milestone:** a stranger can go from your LinkedIn to a running demo of your best project in under 3 clicks.\n\n## Week 2 — Calibrate the market\n\n- [ ] Spend 3 days reading 30+ remote AI/ML job posts on the boards above. Build a spreadsheet: company, role, stack, seniority, salary (if listed), what they ask for. Pat
